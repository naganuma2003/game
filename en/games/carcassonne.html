<script>
/* ===== TILE DEFINITIONS ===== */
const TILE_DEFS = [
  {n:'F',e:'F',s:'F',w:'F',center:'M',cityGroups:[],roadGroups:[],count:4},
  {n:'F',e:'F',s:'R',w:'F',center:'M',cityGroups:[],roadGroups:[[2]],count:2},
  {n:'C',e:'F',s:'F',w:'F',center:'F',cityGroups:[[0]],roadGroups:[],count:5},
  {n:'F',e:'C',s:'F',w:'F',center:'F',cityGroups:[[1]],roadGroups:[],count:0},
  {n:'C',e:'C',s:'F',w:'F',center:'C',cityGroups:[[0,1]],roadGroups:[],count:3},
  {n:'C',e:'C',s:'F',w:'F',center:'C',cityGroups:[[0,1]],roadGroups:[],shield:true,count:2},
  {n:'C',e:'F',s:'C',w:'F',center:'F',cityGroups:[[0],[2]],roadGroups:[],count:3},
  {n:'C',e:'C',s:'F',w:'C',center:'C',cityGroups:[[0,1,3]],roadGroups:[],count:3},
  {n:'C',e:'C',s:'F',w:'C',center:'C',cityGroups:[[0,1,3]],roadGroups:[],shield:true,count:2},
  {n:'C',e:'C',s:'C',w:'C',center:'C',cityGroups:[[0,1,2,3]],roadGroups:[],count:1},
  {n:'C',e:'C',s:'C',w:'C',center:'C',cityGroups:[[0,1,2,3]],roadGroups:[],shield:true,count:2},
  {n:'C',e:'R',s:'F',w:'R',center:'R',cityGroups:[[0]],roadGroups:[[1,3]],count:3},
  {n:'C',e:'F',s:'R',w:'R',center:'R',cityGroups:[[0]],roadGroups:[[2,3]],count:3},
  {n:'C',e:'F',s:'R',w:'F',center:'F',cityGroups:[[0]],roadGroups:[[2]],count:3},
  {n:'C',e:'C',s:'R',w:'F',center:'C',cityGroups:[[0,1]],roadGroups:[[2]],count:2},
  {n:'C',e:'C',s:'R',w:'R',center:'C',cityGroups:[[0,1]],roadGroups:[[2],[3]],count:2},
  {n:'R',e:'F',s:'R',w:'F',center:'R',cityGroups:[],roadGroups:[[0,2]],count:8},
  {n:'F',e:'R',s:'R',w:'F',center:'R',cityGroups:[],roadGroups:[[1,2]],count:6},
  {n:'F',e:'R',s:'R',w:'R',center:'R',cityGroups:[],roadGroups:[[1],[2],[3]],count:4},
  {n:'R',e:'R',s:'R',w:'R',center:'R',cityGroups:[],roadGroups:[[0],[1],[2],[3]],count:1},
  {n:'R',e:'R',s:'R',w:'F',center:'R',cityGroups:[],roadGroups:[[0],[1],[2]],count:0},
];

const PLAYER_COLORS = ['#e74c3c','#3498db','#2ecc71','#f1c40f'];
const PLAYER_NAMES = ['Red','Blue','Green','Yellow'];
const EDGES = ['n','e','s','w'];
const OPPE = [2,3,0,1];
const DX = [0,1,0,-1];
const DY = [-1,0,1,0];

let state = null;
let mode = 'pvp2';
let cpuLevel = 0;
let myOnlineSeat = -1;
let onlineSend = null;
let isOnlineGame = false;
let onlineNcpus = 0;

let viewOX = 0, viewOY = 0;
let CELL = 56;
let panStart = null;
let isPanning = false;

let currentRot = 0;
let placingPhase = false;
let lastPlacedPos = null;
let validMoves = [];
let highlightedMove = null;

function buildDeck() {
  const deck = [];
  for (const def of TILE_DEFS) {
    for (let i = 0; i < def.count; i++) deck.push({ ...def });
  }
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  return deck;
}

function rotateTile(tile, times) {
  let t = { ...tile, cityGroups: tile.cityGroups.map(g=>[...g]), roadGroups: tile.roadGroups.map(g=>[...g]) };
  for (let k = 0; k < times; k++) {
    const old = [t.n, t.e, t.s, t.w];
    [t.n, t.e, t.s, t.w] = [old[3], old[0], old[1], old[2]];
    t.cityGroups = t.cityGroups.map(g => g.map(i => (i + 1) % 4));
    t.roadGroups = t.roadGroups.map(g => g.map(i => (i + 1) % 4));
  }
  return t;
}

function getRotatedTile(tile, rot) {
  return rotateTile(tile, rot);
}

function initGame(nPlayers) {
  const deck = buildDeck();
  const startDef = TILE_DEFS.find(t => t.n==='F'&&t.e==='R'&&t.s==='R'&&t.w==='F'&&t.center==='R');
  const startTile = startDef ? { ...startDef } : { n:'F',e:'F',s:'F',w:'F',center:'F',cityGroups:[],roadGroups:[] };

  const scores = new Array(nPlayers).fill(0);
  const meeples = new Array(nPlayers).fill(7);

  const board = {};
  board['0,0'] = { tile: startTile, rot: 0, meeple: null };

  state = {
    board, deck,
    nPlayers,
    scores,
    meeples,
    turn: 0,
    phase: 'place',
    currentTile: deck.shift(),
    currentRot: 0,
    lastPlaced: null,
  };

  currentRot = 0;
  placingPhase = false;
  computeValidMoves();
  centerView();
  renderAll();
  updateHUD();
  updateMsg();
}

function posKey(x, y) { return `${x},${y}`; }
function parseKey(k) { const [x,y]=k.split(',').map(Number); return {x,y}; }

function getEdgeVal(tile, rot, edgeIdx) {
  const rotated = getRotatedTile(tile, rot);
  return [rotated.n, rotated.e, rotated.s, rotated.w][edgeIdx];
}

function canPlace(tile, rot, x, y) {
  if (state.board[posKey(x,y)]) return false;
  let hasNeighbor = false;
  for (let d = 0; d < 4; d++) {
    const nx = x + DX[d], ny = y + DY[d];
    const cell = state.board[posKey(nx, ny)];
    if (!cell) continue;
    hasNeighbor = true;
    const myEdge = getEdgeVal(tile, rot, d);
    const theirEdge = getEdgeVal(cell.tile, cell.rot, OPPE[d]);
    if (myEdge !== theirEdge) return false;
  }
  return hasNeighbor;
}

function computeValidMoves() {
  validMoves = [];
  if (!state || state.phase !== 'place') return;
  const tile = state.currentTile;
  const rot = currentRot;
  const checked = new Set();
  for (const key of Object.keys(state.board)) {
    const { x, y } = parseKey(key);
    for (let d = 0; d < 4; d++) {
      const nx = x + DX[d], ny = y + DY[d];
      const nkey = posKey(nx, ny);
      if (checked.has(nkey)) continue;
      checked.add(nkey);
      if (canPlace(tile, rot, nx, ny)) {
        validMoves.push({ x: nx, y: ny });
      }
    }
  }
}

function getTileEdgeGroup(tile, rot, edgeIdx, featureType) {
  const rotated = getRotatedTile(tile, rot);
  const groups = featureType === 'C' ? rotated.cityGroups : rotated.roadGroups;
  for (const g of groups) {
    if (g.includes(edgeIdx)) return g;
  }
  return null;
}

function dirToEdge(dir) {
  if (dir === 'N') return 0;
  if (dir === 'E') return 1;
  if (dir === 'S') return 2;
  if (dir === 'W') return 3;
  return null;
}

function checkCityComplete(x, y, edgeIdx) {
  const visited = new Set();
  visited.add(`${x},${y},${edgeIdx}`);
  const queue = [{ x, y, edge: edgeIdx }];
  const tiles = new Set();
  const meeples = [];
  let shieldCount = 0;
  let complete = true;

  while (queue.length) {
    const { x: cx, y: cy, edge } = queue.shift();
    const cell = state.board[posKey(cx, cy)];
    if (!cell) { complete = false; continue; }
    const rotated = getRotatedTile(cell.tile, cell.rot);
    const group = rotated.cityGroups.find(g => g.includes(edge));
    if (!group) { complete = false; continue; }
    const tk = posKey(cx, cy);
    if (!tiles.has(tk)) {
      tiles.add(tk);
      if (cell.tile.shield) shieldCount++;
    }
    if (cell.meeple) {
      const m = cell.meeple;
      const mEdge = dirToEdge(m.dir);
      if (mEdge !== null && group.includes(mEdge)) {
        const mk = `${m.seat},${cx},${cy}`;
        if (!meeples.find(e=>e.mk===mk)) meeples.push({ seat: m.seat, x: cx, y: cy, mk });
      }
    }
    for (const g of group) {
      const nx = cx + DX[g], ny = cy + DY[g];
      const destKey = `${nx},${ny},${OPPE[g]}`;
      if (!visited.has(destKey)) {
        visited.add(destKey);
        queue.push({ x: nx, y: ny, edge: OPPE[g] });
      }
    }
  }
  return { tiles: [...tiles].map(k=>parseKey(k)), shieldCount, meeples, complete };
}

function checkRoadComplete(x, y, edgeIdx) {
  const visited = new Set();
  visited.add(`${x},${y},${edgeIdx}`);
  const queue = [{ x, y, edge: edgeIdx }];
  const tiles = new Set();
  const meeples = [];
  let complete = true;

  while (queue.length) {
    const { x: cx, y: cy, edge } = queue.shift();
    const cell = state.board[posKey(cx, cy)];
    if (!cell) { complete = false; continue; }
    const rotated = getRotatedTile(cell.tile, cell.rot);
    const group = rotated.roadGroups.find(g => g.includes(edge));
    if (!group) {
      tiles.add(posKey(cx, cy));
      if (cell.meeple) {
        const m = cell.meeple;
        if (m.dir === 'C' || dirToEdge(m.dir) === edge) {
          const mk = `${m.seat},${cx},${cy}`;
          if (!meeples.find(e=>e.mk===mk)) meeples.push({ seat: m.seat, x: cx, y: cy, mk });
        }
      }
      continue;
    }
    tiles.add(posKey(cx, cy));
    if (cell.meeple) {
      const m = cell.meeple;
      const mEdge = dirToEdge(m.dir);
      if ((mEdge !== null && group.includes(mEdge)) || m.dir === 'C') {
        const mk = `${m.seat},${cx},${cy}`;
        if (!meeples.find(e=>e.mk===mk)) meeples.push({ seat: m.seat, x: cx, y: cy, mk });
      }
    }
    for (const g of group) {
      const nx = cx + DX[g], ny = cy + DY[g];
      const destKey = `${nx},${ny},${OPPE[g]}`;
      if (!visited.has(destKey)) {
        visited.add(destKey);
        queue.push({ x: nx, y: ny, edge: OPPE[g] });
      }
    }
  }
  return { tiles: [...tiles].map(k=>parseKey(k)), meeples, complete };
}

function checkMonastery(x, y) {
  let count = 0;
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      if (dx === 0 && dy === 0) continue;
      if (state.board[posKey(x+dx, y+dy)]) count++;
    }
  }
  return { count, complete: count === 8 };
}

function getWinners(meeples) {
  const counts = {};
  for (const m of meeples) {
    counts[m.seat] = (counts[m.seat] || 0) + 1;
  }
  if (Object.keys(counts).length === 0) return [];
  const max = Math.max(...Object.values(counts));
  return Object.keys(counts).filter(s => counts[s] === max).map(Number);
}

function removeMeeples(meeples) {
  for (const m of meeples) {
    const cell = state.board[posKey(m.x, m.y)];
    if (cell && cell.meeple && cell.meeple.seat === m.seat) {
      state.meeples[m.seat]++;
      cell.meeple = null;
    }
  }
}

function scoreCompletedFeatures(px, py) {
  const cell = state.board[posKey(px, py)];
  if (!cell) return;
  const rotated = getRotatedTile(cell.tile, cell.rot);
  const scoredCities = new Set();
  const scoredRoads = new Set();

  for (let edge = 0; edge < 4; edge++) {
    if ([rotated.n, rotated.e, rotated.s, rotated.w][edge] !== 'C') continue;
    const res = checkCityComplete(px, py, edge);
    if (!res.complete) continue;
    const sig = res.tiles.map(t=>posKey(t.x,t.y)).sort().join('|');
    if (scoredCities.has(sig)) continue;
    scoredCities.add(sig);
    if (res.meeples.length === 0) continue;
    const pts = res.tiles.length * 2 + res.shieldCount * 2;
    const winners = getWinners(res.meeples);
    for (const s of winners) state.scores[s] += pts;
    removeMeeples(res.meeples);
  }

  for (let edge = 0; edge < 4; edge++) {
    if ([rotated.n, rotated.e, rotated.s, rotated.w][edge] !== 'R') continue;
    const res = checkRoadComplete(px, py, edge);
    if (!res.complete) continue;
    const sig = res.tiles.map(t=>posKey(t.x,t.y)).sort().join('|');
    if (scoredRoads.has(sig)) continue;
    scoredRoads.add(sig);
    if (res.meeples.length === 0) continue;
    const pts = res.tiles.length;
    const winners = getWinners(res.meeples);
    for (const s of winners) state.scores[s] += pts;
    removeMeeples(res.meeples);
  }

  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const mx = px+dx, my = py+dy;
      const mc = state.board[posKey(mx, my)];
      if (!mc) continue;
      const mr = getRotatedTile(mc.tile, mc.rot);
      if (mr.center !== 'M') continue;
      if (!mc.meeple || mc.meeple.dir !== 'C') continue;
      const { complete } = checkMonastery(mx, my);
      if (!complete) continue;
      state.scores[mc.meeple.seat] += 9;
      state.meeples[mc.meeple.seat]++;
      mc.meeple = null;
    }
  }
}

function finalScoring() {
  const scoredCities = new Set();
  const scoredRoads = new Set();
  const scoredMonasteries = new Set();

  for (const key of Object.keys(state.board)) {
    const { x, y } = parseKey(key);
    const cell = state.board[key];
    const rotated = getRotatedTile(cell.tile, cell.rot);

    for (let edge = 0; edge < 4; edge++) {
      if ([rotated.n, rotated.e, rotated.s, rotated.w][edge] === 'C') {
        const res = checkCityComplete(x, y, edge);
        const sig = res.tiles.map(t=>posKey(t.x,t.y)).sort().join('|');
        if (!scoredCities.has(sig)) {
          scoredCities.add(sig);
          if (res.meeples.length > 0) {
            const pts = res.tiles.length + res.shieldCount;
            const winners = getWinners(res.meeples);
            for (const s of winners) state.scores[s] += pts;
          }
        }
      }
      if ([rotated.n, rotated.e, rotated.s, rotated.w][edge] === 'R') {
        const res = checkRoadComplete(x, y, edge);
        const sig = res.tiles.map(t=>posKey(t.x,t.y)).sort().join('|');
        if (!scoredRoads.has(sig)) {
          scoredRoads.add(sig);
          if (res.meeples.length > 0) {
            const pts = res.tiles.length;
            const winners = getWinners(res.meeples);
            for (const s of winners) state.scores[s] += pts;
          }
        }
      }
    }

    if (rotated.center === 'M' && cell.meeple && cell.meeple.dir === 'C') {
      const mk = posKey(x, y);
      if (!scoredMonasteries.has(mk)) {
        scoredMonasteries.add(mk);
        const { count } = checkMonastery(x, y);
        state.scores[cell.meeple.seat] += 1 + count;
      }
    }
  }
}

function isFeatureOccupied(x, y, dir) {
  if (dir === 'C') {
    const cell = state.board[posKey(x,y)];
    return cell && cell.meeple !== null;
  }
  const edge = dirToEdge(dir);
  const cell = state.board[posKey(x, y)];
  if (!cell) return false;
  const rotated = getRotatedTile(cell.tile, cell.rot);
  const edgeType = [rotated.n, rotated.e, rotated.s, rotated.w][edge];
  if (edgeType === 'C') {
    const res = checkCityComplete(x, y, edge);
    return res.meeples.length > 0;
  } else if (edgeType === 'R') {
    const res = checkRoadComplete(x, y, edge);
    return res.meeples.length > 0;
  }
  return false;
}

function getMeepleDirs(x, y) {
  const cell = state.board[posKey(x, y)];
  if (!cell) return [];
  const rotated = getRotatedTile(cell.tile, cell.rot);
  const dirs = [];
  const edges = [rotated.n, rotated.e, rotated.s, rotated.w];
  const dirNames = ['N','E','S','W'];
  for (let i = 0; i < 4; i++) {
    if (edges[i] === 'F') continue;
    const occupied = isFeatureOccupied(x, y, dirNames[i]);
    dirs.push({ dir: dirNames[i], type: edges[i], disabled: occupied });
  }
  if (rotated.center === 'M') {
    dirs.push({ dir: 'C', type: 'M', disabled: isFeatureOccupied(x, y, 'C') });
  }
  return dirs;
}

function isMyTurn() {
  if (!state) return false;
  if (isOnlineGame) return state.turn === myOnlineSeat;
  if (cpuLevel > 0) return state.turn === 0;
  return true;
}

function applyPlace(x, y, rot) {
  if (!state || state.phase !== 'place') return;
  const tile = state.currentTile;
  if (!canPlace(tile, rot, x, y)) return;
  const placed = { tile, rot, meeple: null };
  state.board[posKey(x, y)] = placed;
  state.lastPlaced = { x, y };
  state.phase = 'meeple';
  lastPlacedPos = { x, y };
  placingPhase = true;
  renderAll();
  updateHUD();
  showMeeplePanel(x, y);
  updateMsg();
}

function applyMeeple(dir) {
  if (!state || state.phase !== 'meeple') return;
  const { x, y } = state.lastPlaced;
  const cell = state.board[posKey(x, y)];
  if (!cell) return;
  if (dir !== null && state.meeples[state.turn] > 0 && !isFeatureOccupied(x, y, dir)) {
    cell.meeple = { seat: state.turn, dir };
    state.meeples[state.turn]--;
  }
  scoreCompletedFeatures(x, y);
  renderAll();
  updateHUD();
  nextTurn();
}

function nextTurn() {
  hideMeeplePanel();
  placingPhase = false;
  if (state.deck.length === 0) {
    finalScoring();
    state.phase = 'end';
    renderAll();
    updateHUD();
    showEndOverlay();
    return;
  }
  state.currentTile = state.deck.shift();
  state.phase = 'place';
  currentRot = 0;
  state.turn = (state.turn + 1) % state.nPlayers;
  let attempts = 0;
  while (!hasAnyValidPlacement(state.currentTile) && state.deck.length > 0 && attempts < 100) {
    state.currentTile = state.deck.shift();
    attempts++;
  }
  if (!hasAnyValidPlacement(state.currentTile) && state.deck.length === 0) {
    finalScoring();
    state.phase = 'end';
    renderAll();
    updateHUD();
    showEndOverlay();
    return;
  }
  computeValidMoves();
  renderAll();
  updateHUD();
  updateMsg();
  drawCurrentTile();
  updateOnlineTurnBadge();
  const cpuTurn = isOnlineGame
    ? shouldOnlineCpuPlay()
    : (!isOnlineGame && cpuLevel > 0 && state.turn !== 0);
  if (cpuTurn) setTimeout(doCPUTurn, 500);
}

function hasAnyValidPlacement(tile) {
  for (let rot = 0; rot < 4; rot++) {
    for (const key of Object.keys(state.board)) {
      const { x, y } = parseKey(key);
      for (let d = 0; d < 4; d++) {
        if (canPlace(tile, rot, x + DX[d], y + DY[d])) return true;
      }
    }
  }
  return false;
}

function evaluateMove(tile, rot, x, y) {
  let score = 0;
  const rotated = getRotatedTile(tile, rot);
  const edges = [rotated.n, rotated.e, rotated.s, rotated.w];
  const key = posKey(x, y);
  const tempCell = { tile, rot, meeple: null };
  state.board[key] = tempCell;
  const scoredCities = new Set();
  for (let edge = 0; edge < 4; edge++) {
    if (edges[edge] !== 'C') continue;
    const res = checkCityComplete(x, y, edge);
    const sig = res.tiles.map(t => posKey(t.x, t.y)).sort().join('|');
    if (scoredCities.has(sig)) continue;
    scoredCities.add(sig);
    if (res.complete) {
      score += res.tiles.length * 2 + res.shieldCount * 2 + 5;
      const winners = getWinners(res.meeples);
      if (winners.includes(state.turn)) score += 8;
    } else {
      const winners = getWinners(res.meeples);
      if (winners.includes(state.turn)) score += res.tiles.length;
    }
  }
  const scoredRoads = new Set();
  for (let edge = 0; edge < 4; edge++) {
    if (edges[edge] !== 'R') continue;
    const res = checkRoadComplete(x, y, edge);
    const sig = res.tiles.map(t => posKey(t.x, t.y)).sort().join('|');
    if (scoredRoads.has(sig)) continue;
    scoredRoads.add(sig);
    if (res.complete) {
      score += res.tiles.length + 3;
      const winners = getWinners(res.meeples);
      if (winners.includes(state.turn)) score += 5;
    } else {
      const winners = getWinners(res.meeples);
      if (winners.includes(state.turn)) score += 1;
    }
  }
  for (let dy = -1; dy <= 1; dy++) {
    for (let dx = -1; dx <= 1; dx++) {
      const mx = x + dx, my = y + dy;
      const mc = state.board[posKey(mx, my)];
      if (!mc) continue;
      const mr = getRotatedTile(mc.tile, mc.rot);
      if (mr.center !== 'M') continue;
      if (mc.meeple && mc.meeple.dir === 'C') {
        const { complete } = checkMonastery(mx, my);
        if (complete) {
          score += 9;
          if (mc.meeple.seat === state.turn) score += 5;
        } else if (mc.meeple.seat === state.turn) {
          score += 1;
        }
      }
    }
  }
  let neighbors = 0;
  for (let d = 0; d < 4; d++) {
    if (state.board[posKey(x + DX[d], y + DY[d])]) neighbors++;
  }
  score += neighbors * 0.5;
  delete state.board[key];
  return score;
}

function cpuChooseMeeple(x, y, level) {
  const dirs = getMeepleDirs(x, y);
  const valid = dirs.filter(d => !d.disabled);
  if (valid.length === 0 || state.meeples[state.turn] === 0) return null;
  if (level === 1) {
    return Math.random() < 0.25 ? valid[Math.floor(Math.random() * valid.length)].dir : null;
  }
  if (level === 2) {
    if (Math.random() < 0.5) return null;
    const cities = valid.filter(d => d.type === 'C');
    const monasteries = valid.filter(d => d.type === 'M');
    if (monasteries.length > 0 && Math.random() < 0.6) return monasteries[0].dir;
    if (cities.length > 0 && Math.random() < 0.6) return cities[0].dir;
    return valid[Math.floor(Math.random() * valid.length)].dir;
  }
  let bestDir = null, bestVal = -1;
  const cell = state.board[posKey(x, y)];
  const rotated = getRotatedTile(cell.tile, cell.rot);
  for (const { dir, type } of valid) {
    let val = 0;
    const edge = dirToEdge(dir);
    if (dir === 'C' && rotated.center === 'M') {
      const { count } = checkMonastery(x, y);
      val = count + 1 + 3;
    } else if (type === 'C' && edge !== null) {
      const res = checkCityComplete(x, y, edge);
      if (res.complete) val = res.tiles.length * 2 + res.shieldCount * 2;
      else val = res.tiles.length * 1.5 + res.shieldCount;
    } else if (type === 'R' && edge !== null) {
      const res = checkRoadComplete(x, y, edge);
      if (res.complete) val = res.tiles.length;
      else val = res.tiles.length * 0.5;
    }
    if (val > bestVal) { bestVal = val; bestDir = dir; }
  }
  if (bestVal >= 2 || (state.meeples[state.turn] >= 4 && bestVal >= 1)) return bestDir;
  if (state.meeples[state.turn] >= 5 && Math.random() < 0.3 && valid.length > 0) {
    return valid[Math.floor(Math.random() * valid.length)].dir;
  }
  return null;
}

function doCPUTurn() {
  if (!state || state.phase !== 'place') return;
  const level = cpuLevel || 2;
  const moves = [];
  for (let rot = 0; rot < 4; rot++) {
    for (const key of Object.keys(state.board)) {
      const { x, y } = parseKey(key);
      for (let d = 0; d < 4; d++) {
        const nx = x + DX[d], ny = y + DY[d];
        if (canPlace(state.currentTile, rot, nx, ny)) moves.push({ x: nx, y: ny, rot });
      }
    }
  }
  if (moves.length === 0) {
    if (isOnlineGame) onlineSend({ type: 'skip-meeple' }); else nextTurn();
    return;
  }
  let pick;
  if (level === 1) {
    if (Math.random() < 0.2 && moves.length > 1) {
      const scored = moves.map(m => ({ ...m, score: evaluateMove(state.currentTile, m.rot, m.x, m.y) }));
      scored.sort((a, b) => b.score - a.score);
      pick = scored[Math.floor(Math.random() * Math.min(3, scored.length))];
    } else {
      pick = moves[Math.floor(Math.random() * moves.length)];
    }
  } else if (level === 2) {
    const scored = moves.map(m => ({ ...m, score: evaluateMove(state.currentTile, m.rot, m.x, m.y) }));
    scored.sort((a, b) => b.score - a.score);
    const topN = Math.max(1, Math.ceil(scored.length * 0.4));
    pick = scored[Math.floor(Math.random() * topN)];
  } else {
    const scored = moves.map(m => ({ ...m, score: evaluateMove(state.currentTile, m.rot, m.x, m.y) }));
    scored.sort((a, b) => b.score - a.score);
    const best = scored.filter(m => m.score === scored[0].score);
    pick = best[Math.floor(Math.random() * best.length)];
  }
  currentRot = pick.rot;
  computeValidMoves();
  renderAll();
  drawCurrentTile();
  setTimeout(() => {
    if (isOnlineGame) {
      onlineSend({ type: 'place', x: pick.x, y: pick.y, rot: pick.rot });
    } else {
      applyPlace(pick.x, pick.y, pick.rot);
    }
    setTimeout(() => {
      if (state.phase !== 'meeple') return;
      const chooseDir = cpuChooseMeeple(pick.x, pick.y, level);
      if (isOnlineGame) {
        onlineSend(chooseDir ? { type: 'meeple', dir: chooseDir } : { type: 'skip-meeple' });
      } else {
        applyMeeple(chooseDir);
      }
    }, 400);
  }, 400);
}

function computeEval() {
  if (!state || cpuLevel === 0) {
    document.getElementById('eval-bar-wrap').classList.remove('show');
    return;
  }
  document.getElementById('eval-bar-wrap').classList.add('show');
  const potential = new Array(state.nPlayers).fill(0);
  const scoredCities = new Set();
  const scoredRoads = new Set();
  for (const key of Object.keys(state.board)) {
    const { x, y } = parseKey(key);
    const cell = state.board[key];
    const rotated = getRotatedTile(cell.tile, cell.rot);
    const edges = [rotated.n, rotated.e, rotated.s, rotated.w];
    for (let edge = 0; edge < 4; edge++) {
      if (edges[edge] === 'C') {
        const res = checkCityComplete(x, y, edge);
        const sig = res.tiles.map(t => posKey(t.x, t.y)).sort().join('|');
        if (!scoredCities.has(sig) && !res.complete && res.meeples.length > 0) {
          scoredCities.add(sig);
          const pts = res.tiles.length * 1.2 + res.shieldCount * 0.8;
          const winners = getWinners(res.meeples);
          for (const s of winners) potential[s] += pts;
        } else { scoredCities.add(sig); }
      }
      if (edges[edge] === 'R') {
        const res = checkRoadComplete(x, y, edge);
        const sig = res.tiles.map(t => posKey(t.x, t.y)).sort().join('|');
        if (!scoredRoads.has(sig) && !res.complete && res.meeples.length > 0) {
          scoredRoads.add(sig);
          const pts = res.tiles.length * 0.6;
          const winners = getWinners(res.meeples);
          for (const s of winners) potential[s] += pts;
        } else { scoredRoads.add(sig); }
      }
    }
    if (rotated.center === 'M' && cell.meeple && cell.meeple.dir === 'C') {
      const { count } = checkMonastery(x, y);
      potential[cell.meeple.seat] += (1 + count) * 0.7;
    }
  }
  const humanVal = state.scores[0] + potential[0];
  const cpuVal = state.scores[1] + potential[1];
  const diff = humanVal - cpuVal;
  const pct = Math.max(2, Math.min(98, 50 + diff * 1.5));
  document.getElementById('eval-bar-inner').style.width = pct + '%';
  const sign = diff > 0 ? '+' : '';
  document.getElementById('eval-bar-text').textContent =
    diff === 0 ? 'Even' : `${PLAYER_NAMES[0]} ${sign}${diff.toFixed(1)}`;
}

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const CANVAS_W = Math.min(window.innerWidth - 16, 600);
const CANVAS_H = Math.min(window.innerHeight * 0.5, 400);
canvas.width = CANVAS_W;
canvas.height = CANVAS_H;

function centerView() {
  viewOX = CANVAS_W / 2 - CELL / 2;
  viewOY = CANVAS_H / 2 - CELL / 2;
}

function boardToCanvas(x, y) {
  return { cx: viewOX + x * CELL, cy: viewOY + y * CELL };
}

function canvasToBoard(cx, cy) {
  return {
    x: Math.floor((cx - viewOX) / CELL),
    y: Math.floor((cy - viewOY) / CELL)
  };
}

function drawTileOnCtx(ctx2, tile, rot, px, py, size, meeple) {
  const rotated = getRotatedTile(tile, rot);
  const edges = [rotated.n, rotated.e, rotated.s, rotated.w];
  const h = size, w = size;
  const mx = px + w/2, my = py + h/2;
  const edgeD = w * 0.30;
  const fg = ctx2.createRadialGradient(mx, my, 0, mx, my, w * 0.8);
  fg.addColorStop(0, '#70c43a');
  fg.addColorStop(1, '#3c7018');
  ctx2.fillStyle = fg;
  ctx2.fillRect(px, py, w, h);
  const DIRS = ['N', 'E', 'S', 'W'];
  _drawCity(ctx2, edges, rotated.center, px, py, w, h, edgeD);
  if (rotated.center === 'M') _drawMonastery(ctx2, px, py, w, h);
  const roadW = w * 0.18;
  for (let i = 0; i < 4; i++) {
    if (edges[i] === 'R') _drawRoadEdge(ctx2, DIRS[i], px, py, w, h, roadW);
  }
  if (rotated.center === 'R') {
    const rg = ctx2.createRadialGradient(mx, my, 0, mx, my, roadW);
    rg.addColorStop(0, '#ecd8a0');
    rg.addColorStop(1, '#a88850');
    ctx2.fillStyle = rg;
    ctx2.beginPath();
    ctx2.arc(mx, my, roadW * 0.75, 0, Math.PI * 2);
    ctx2.fill();
  }
  if (tile.shield) _drawShield(ctx2, px, py, w, h);
  ctx2.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx2.lineWidth = 1;
  ctx2.strokeRect(px, py, w, h);
  if (meeple) drawMeepleOnTile(ctx2, meeple, px, py, w, h, rotated);
}

function _drawCity(ctx2, edges, center, px, py, w, h, d) {
  const cityEdges = [0,1,2,3].filter(i => edges[i] === 'C');
  if (!cityEdges.length) return;
  const stroke = '#7a5020', lw = Math.max(1, w * 0.025);
  ctx2.lineJoin = 'round'; ctx2.lineCap = 'round';
  if (center === 'C' && cityEdges.length >= 2) {
    if (cityEdges.length === 4) { _fillCityRect(ctx2, px, py, w, h); return; }
    if (cityEdges.length === 3) {
      _fillCityRect(ctx2, px, py, w, h);
      _fieldNotch(ctx2, [0,1,2,3].find(i => edges[i] !== 'C'), px, py, w, h, stroke, lw);
      return;
    }
    _cornerCity(ctx2, cityEdges, px, py, w, h, stroke, lw);
    return;
  }
  const DIRS = ['N','E','S','W'];
  for (const i of cityEdges) _drawCityEdge(ctx2, DIRS[i], px, py, w, h, d);
  ctx2.strokeStyle = stroke; ctx2.lineWidth = lw;
  if (edges[0]==='C'){ ctx2.beginPath(); ctx2.moveTo(px, py+d); ctx2.lineTo(px+w, py+d); ctx2.stroke(); }
  if (edges[1]==='C'){ ctx2.beginPath(); ctx2.moveTo(px+w-d, py); ctx2.lineTo(px+w-d, py+h); ctx2.stroke(); }
  if (edges[2]==='C'){ ctx2.beginPath(); ctx2.moveTo(px, py+h-d); ctx2.lineTo(px+w, py+h-d); ctx2.stroke(); }
  if (edges[3]==='C'){ ctx2.beginPath(); ctx2.moveTo(px+d, py); ctx2.lineTo(px+d, py+h); ctx2.stroke(); }
}

function _fillCityRect(ctx2, px, py, w, h) {
  const g = ctx2.createRadialGradient(px+w/2, py+h/2, w*0.1, px+w/2, py+h/2, w*0.78);
  g.addColorStop(0, '#e2bc80'); g.addColorStop(1, '#b87c38');
  ctx2.fillStyle = g; ctx2.fillRect(px, py, w, h);
}

function _cornerCity(ctx2, cityEdges, px, py, w, h, stroke, lw) {
  const C = [[px,py],[px+w,py],[px+w,py+h],[px,py+h]];
  const edgeCorners = [[0,1],[1,2],[2,3],[3,0]];
  const fieldEdges = [0,1,2,3].filter(i => !cityEdges.includes(i));
  const fc = edgeCorners[fieldEdges[0]].find(c => edgeCorners[fieldEdges[1]].includes(c));
  const cityCorners = [0,1,2,3].filter(c => c !== fc);
  const adj = edgeCorners[fieldEdges[0]].concat(edgeCorners[fieldEdges[1]]).filter(c => c !== fc);
  const allCity = cityCorners.find(c => !adj.includes(c));
  ctx2.beginPath();
  ctx2.moveTo(C[cityCorners[0]][0], C[cityCorners[0]][1]);
  for (let k = 1; k < cityCorners.length; k++) ctx2.lineTo(C[cityCorners[k]][0], C[cityCorners[k]][1]);
  ctx2.closePath();
  const g = ctx2.createLinearGradient(C[fc][0], C[fc][1], C[allCity][0], C[allCity][1]);
  g.addColorStop(0, '#c8945a'); g.addColorStop(1, '#e6c088');
  ctx2.fillStyle = g; ctx2.fill();
  ctx2.strokeStyle = stroke; ctx2.lineWidth = lw;
  ctx2.beginPath(); ctx2.moveTo(C[adj[0]][0], C[adj[0]][1]); ctx2.lineTo(C[adj[1]][0], C[adj[1]][1]); ctx2.stroke();
}

function _fieldNotch(ctx2, f, px, py, w, h, stroke, lw) {
  const mids = [[px+w/2, py], [px+w, py+h/2], [px+w/2, py+h], [px, py+h/2]];
  const cx = mids[f][0], cy = mids[f][1], r = w * 0.32;
  ctx2.save();
  ctx2.beginPath(); ctx2.arc(cx, cy, r, 0, Math.PI*2); ctx2.clip();
  const fg = ctx2.createRadialGradient(cx, cy, 0, cx, cy, r);
  fg.addColorStop(0, '#70c43a'); fg.addColorStop(1, '#3c7018');
  ctx2.fillStyle = fg; ctx2.fillRect(px, py, w, h);
  ctx2.restore();
  let a0, a1;
  if (f === 0) { a0 = 0; a1 = Math.PI; }
  else if (f === 1) { a0 = Math.PI/2; a1 = 3*Math.PI/2; }
  else if (f === 2) { a0 = Math.PI; a1 = 2*Math.PI; }
  else { a0 = -Math.PI/2; a1 = Math.PI/2; }
  ctx2.strokeStyle = stroke; ctx2.lineWidth = lw;
  ctx2.beginPath(); ctx2.arc(cx, cy, r, a0, a1); ctx2.stroke();
}

function _drawCityEdge(ctx2, dir, px, py, w, h, d) {
  let g;
  if (dir === 'N') { g = ctx2.createLinearGradient(0, py, 0, py + d); g.addColorStop(0, '#8c5c28'); g.addColorStop(0.25, '#d4a060'); g.addColorStop(1, '#c09050'); ctx2.fillStyle = g; ctx2.fillRect(px, py, w, d); }
  else if (dir === 'S') { g = ctx2.createLinearGradient(0, py + h, 0, py + h - d); g.addColorStop(0, '#8c5c28'); g.addColorStop(0.25, '#d4a060'); g.addColorStop(1, '#c09050'); ctx2.fillStyle = g; ctx2.fillRect(px, py + h - d, w, d); }
  else if (dir === 'E') { g = ctx2.createLinearGradient(px + w, 0, px + w - d, 0); g.addColorStop(0, '#8c5c28'); g.addColorStop(0.25, '#d4a060'); g.addColorStop(1, '#c09050'); ctx2.fillStyle = g; ctx2.fillRect(px + w - d, py, d, h); }
  else if (dir === 'W') { g = ctx2.createLinearGradient(px, 0, px + d, 0); g.addColorStop(0, '#8c5c28'); g.addColorStop(0.25, '#d4a060'); g.addColorStop(1, '#c09050'); ctx2.fillStyle = g; ctx2.fillRect(px, py, d, h); }
}

function _drawRoadEdge(ctx2, dir, px, py, w, h, rw) {
  const half = rw / 2;
  let g;
  if (dir === 'N' || dir === 'S') {
    g = ctx2.createLinearGradient(px + w/2 - half, 0, px + w/2 + half, 0);
    g.addColorStop(0, '#9a7840'); g.addColorStop(0.2, '#ead49c'); g.addColorStop(0.8, '#ead49c'); g.addColorStop(1, '#9a7840');
    ctx2.fillStyle = g;
    if (dir === 'N') ctx2.fillRect(px + w/2 - half, py, rw, h/2 + half);
    else ctx2.fillRect(px + w/2 - half, py + h/2 - half, rw, h/2 + half);
  } else {
    g = ctx2.createLinearGradient(0, py + h/2 - half, 0, py + h/2 + half);
    g.addColorStop(0, '#9a7840'); g.addColorStop(0.2, '#ead49c'); g.addColorStop(0.8, '#ead49c'); g.addColorStop(1, '#9a7840');
    ctx2.fillStyle = g;
    if (dir === 'E') ctx2.fillRect(px + w/2 - half, py + h/2 - half, w/2 + half, rw);
    else ctx2.fillRect(px, py + h/2 - half, w/2 + half, rw);
  }
}

function _drawMonastery(ctx2, px, py, w, h) {
  const mx = px + w/2, my = py + h/2;
  const bw = w * 0.30, bh = h * 0.24;
  const bx = mx - bw/2, by = my - bh * 0.15;
  ctx2.fillStyle = 'rgba(0,0,0,0.18)';
  ctx2.fillRect(bx + 2, by + 2, bw, bh);
  ctx2.fillStyle = '#9a7448';
  ctx2.fillRect(bx, by, bw, bh);
  ctx2.fillStyle = '#5c3818';
  ctx2.beginPath();
  ctx2.moveTo(mx, by - bh * 0.55);
  ctx2.lineTo(bx - bw * 0.08, by + 1);
  ctx2.lineTo(bx + bw + bw * 0.08, by + 1);
  ctx2.closePath();
  ctx2.fill();
  ctx2.fillStyle = '#ffeaa0';
  ctx2.fillRect(bx + bw * 0.12, by + bh * 0.25, bw * 0.28, bh * 0.38);
  ctx2.fillRect(bx + bw * 0.60, by + bh * 0.25, bw * 0.28, bh * 0.38);
  ctx2.fillStyle = '#e8d4a0';
  ctx2.fillRect(mx - w * 0.018, by - bh * 0.5, w * 0.036, bh * 0.38);
  ctx2.fillRect(mx - w * 0.065, by - bh * 0.28, w * 0.13, h * 0.032);
}

function _drawShield(ctx2, px, py, w, h) {
  const sx = px + w * 0.78, sy = py + h * 0.08;
  const sw = w * 0.16, sh = h * 0.16;
  ctx2.beginPath();
  ctx2.moveTo(sx, sy);
  ctx2.lineTo(sx + sw, sy);
  ctx2.lineTo(sx + sw, sy + sh * 0.62);
  ctx2.quadraticCurveTo(sx + sw, sy + sh, sx + sw / 2, sy + sh);
  ctx2.quadraticCurveTo(sx, sy + sh, sx, sy + sh * 0.62);
  ctx2.closePath();
  ctx2.fillStyle = '#1848c0';
  ctx2.fill();
  ctx2.strokeStyle = '#d4a020';
  ctx2.lineWidth = Math.max(1, w * 0.022);
  ctx2.stroke();
  ctx2.fillStyle = '#ffe040';
  ctx2.font = `bold ${Math.max(6, Math.floor(w * 0.095))}px sans-serif`;
  ctx2.textAlign = 'center';
  ctx2.textBaseline = 'middle';
  ctx2.fillText('★', sx + sw / 2, sy + sh * 0.44);
}

function drawMeepleOnTile(ctx2, meeple, px, py, w, h, rotated) {
  const color = PLAYER_COLORS[meeple.seat];
  let mx = px + w/2, my = py + h/2;
  const offset = w * 0.28;
  if (meeple.dir === 'N') my = py + offset;
  else if (meeple.dir === 'E') mx = px + w - offset;
  else if (meeple.dir === 'S') my = py + h - offset;
  else if (meeple.dir === 'W') mx = px + offset;
  const r = w * 0.13;
  ctx2.fillStyle = color;
  ctx2.strokeStyle = '#fff';
  ctx2.lineWidth = 1.5;
  ctx2.beginPath();
  ctx2.arc(mx, my, r, 0, Math.PI*2);
  ctx2.fill();
  ctx2.stroke();
}

function renderAll() {
  ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
  if (!state) return;
  for (const key of Object.keys(state.board)) {
    const { x, y } = parseKey(key);
    const cell = state.board[key];
    const { cx, cy } = boardToCanvas(x, y);
    if (cx + CELL < 0 || cy + CELL < 0 || cx > CANVAS_W || cy > CANVAS_H) continue;
    drawTileOnCtx(ctx, cell.tile, cell.rot, cx, cy, CELL, cell.meeple);
  }
  if (state.phase === 'place') {
    for (const { x, y } of validMoves) {
      const { cx, cy } = boardToCanvas(x, y);
      if (cx + CELL < 0 || cy + CELL < 0 || cx > CANVAS_W || cy > CANVAS_H) continue;
      ctx.strokeStyle = 'rgba(80,220,80,0.8)';
      ctx.lineWidth = 2;
      ctx.setLineDash([4, 3]);
      ctx.strokeRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(80,220,80,0.15)';
      ctx.fillRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
    }
  }
  if (state.lastPlaced) {
    const { x, y } = state.lastPlaced;
    const { cx, cy } = boardToCanvas(x, y);
    ctx.strokeStyle = 'rgba(255,200,0,0.9)';
    ctx.lineWidth = 2.5;
    ctx.setLineDash([]);
    ctx.strokeRect(cx + 1, cy + 1, CELL - 2, CELL - 2);
  }
  drawCurrentTileOverlay();
}

function drawCurrentTileOverlay() {
  if (!highlightedMove || !state || state.phase !== 'place') return;
  const { x, y } = highlightedMove;
  const { cx, cy } = boardToCanvas(x, y);
  ctx.globalAlpha = 0.5;
  drawTileOnCtx(ctx, state.currentTile, currentRot, cx, cy, CELL, null);
  ctx.globalAlpha = 1;
}

const curCanvas = document.getElementById('current-tile-canvas');
const curCtx = curCanvas.getContext('2d');
function drawCurrentTile() {
  curCtx.clearRect(0, 0, 56, 56);
  if (!state || !state.currentTile) return;
  drawTileOnCtx(curCtx, state.currentTile, currentRot, 0, 0, 56, null);
}

function updateHUD() {
  if (!state) return;
  const hud = document.getElementById('hud');
  hud.innerHTML = '';
  for (let i = 0; i < state.nPlayers; i++) {
    const div = document.createElement('div');
    div.className = 'hud-player' + (state.turn === i && state.phase !== 'end' ? ' active' : '') + (isOnlineGame && i === myOnlineSeat ? ' me' : '');
    div.innerHTML = `<div class="hud-dot" style="background:${PLAYER_COLORS[i]}"></div>
      <span>${PLAYER_NAMES[i]}</span>
      <span class="hud-score">${state.scores[i]}</span>
      <span class="hud-meeples">♟×${state.meeples[i]}</span>`;
    hud.appendChild(div);
  }
  document.getElementById('tile-remaining').textContent = `${state.deck.length} tiles left`;
  computeEval();
}

function updateMsg() {
  if (!state) return;
  const msg = document.getElementById('msg');
  if (state.phase === 'end') { msg.textContent = 'Game Over'; return; }
  if (state.phase === 'place') {
    if (isOnlineGame && !isMyTurn()) {
      msg.textContent = `${PLAYER_NAMES[state.turn]}'s turn (waiting)`;
    } else {
      msg.textContent = `${PLAYER_NAMES[state.turn]}'s turn: Place a tile`;
    }
  } else if (state.phase === 'meeple') {
    if (isOnlineGame && !isMyTurn()) {
      msg.textContent = `${PLAYER_NAMES[state.turn]} is placing a meeple...`;
    } else {
      msg.textContent = `${PLAYER_NAMES[state.turn]}: Choose where to place a meeple`;
    }
  }
}

function showMeeplePanel(x, y) {
  const panel = document.getElementById('meeple-panel');
  const dirsEl = document.getElementById('meeple-dirs');
  dirsEl.innerHTML = '';
  if (!isMyTurn()) {
    panel.classList.add('show');
    document.getElementById('skip-meeple').style.display = 'none';
    return;
  }
  document.getElementById('skip-meeple').style.display = '';
  const dirs = getMeepleDirs(x, y);
  if (dirs.length === 0 || state.meeples[state.turn] === 0) {
    hideMeeplePanel();
    if (isOnlineGame) { onlineSend({ type: 'skip-meeple' }); } else { applyMeeple(null); }
    return;
  }
  const labels = { N: 'North (City/Road)', E: 'East (City/Road)', S: 'South (City/Road)', W: 'West (City/Road)', C: 'Center (Monastery)' };
  for (const { dir, type, disabled } of dirs) {
    const btn = document.createElement('button');
    btn.textContent = labels[dir] || dir;
    btn.disabled = disabled;
    btn.addEventListener('click', () => {
      hideMeeplePanel();
      if (isOnlineGame) { onlineSend({ type: 'meeple', dir }); } else { applyMeeple(dir); }
    });
    dirsEl.appendChild(btn);
  }
  panel.classList.add('show');
}

function hideMeeplePanel() {
  document.getElementById('meeple-panel').classList.remove('show');
}

function showEndOverlay() {
  const scores = state.scores.map((s, i) => ({ seat: i, score: s })).sort((a, b) => b.score - a.score);
  const maxScore = scores[0].score;
  const winners = scores.filter(s => s.score === maxScore);
  document.getElementById('g-t').textContent = winners.length === 1
    ? `${PLAYER_NAMES[winners[0].seat]} Wins!`
    : 'Draw!';
  const list = document.getElementById('g-scores');
  list.innerHTML = scores.map(({ seat, score }) =>
    `<div style="color:${PLAYER_COLORS[seat]};font-weight:${score===maxScore?'700':'400'}">${PLAYER_NAMES[seat]}: ${score} pts</div>`
  ).join('');
  document.getElementById('g-s').textContent = `Total tiles placed: ${Object.keys(state.board).length}`;
  document.getElementById('gov').classList.add('show');
}

canvas.addEventListener('click', (e) => {
  if (!state || state.phase !== 'place') return;
  if (!isMyTurn()) return;
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const { x, y } = canvasToBoard(cx, cy);
  if (!validMoves.find(m => m.x === x && m.y === y)) return;
  if (isOnlineGame) { onlineSend({ type: 'place', x, y, rot: currentRot }); } else { applyPlace(x, y, currentRot); }
});

canvas.addEventListener('mousemove', (e) => {
  if (!state || state.phase !== 'place') { highlightedMove = null; return; }
  if (isPanning) return;
  const rect = canvas.getBoundingClientRect();
  const cx = e.clientX - rect.left;
  const cy = e.clientY - rect.top;
  const { x, y } = canvasToBoard(cx, cy);
  const found = validMoves.find(m => m.x === x && m.y === y);
  const prev = highlightedMove;
  highlightedMove = found ? { x, y } : null;
  if ((prev && !highlightedMove) || (!prev && highlightedMove) || (prev && highlightedMove && (prev.x !== highlightedMove.x || prev.y !== highlightedMove.y))) {
    renderAll();
  }
});
canvas.addEventListener('mouseleave', () => { highlightedMove = null; renderAll(); });

let panRef = null;
canvas.addEventListener('mousedown', (e) => {
  if (e.button === 1 || e.button === 2) {
    panRef = { sx: e.clientX, sy: e.clientY, ox: viewOX, oy: viewOY };
    isPanning = true;
  }
});
canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    panRef = { sx: (e.touches[0].clientX + e.touches[1].clientX)/2, sy: (e.touches[0].clientY + e.touches[1].clientY)/2, ox: viewOX, oy: viewOY };
    isPanning = true;
  } else if (e.touches.length === 1) {
    panRef = { sx: e.touches[0].clientX, sy: e.touches[0].clientY, ox: viewOX, oy: viewOY, timer: setTimeout(() => { isPanning = true; }, 150) };
  }
}, { passive: true });
canvas.addEventListener('touchmove', (e) => {
  if (!panRef) return;
  const mx = e.touches[0].clientX, my = e.touches[0].clientY;
  const dx = mx - panRef.sx, dy = my - panRef.sy;
  if (!isPanning && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) { clearTimeout(panRef.timer); isPanning = true; }
  if (isPanning) { viewOX = panRef.ox + dx; viewOY = panRef.oy + dy; renderAll(); }
}, { passive: true });
canvas.addEventListener('touchend', (e) => {
  if (panRef && panRef.timer) clearTimeout(panRef.timer);
  if (!isPanning && panRef && e.changedTouches.length === 1 && state && state.phase === 'place' && isMyTurn()) {
    const rect = canvas.getBoundingClientRect();
    const cx = e.changedTouches[0].clientX - rect.left;
    const cy = e.changedTouches[0].clientY - rect.top;
    const { x, y } = canvasToBoard(cx, cy);
    if (validMoves.find(m => m.x === x && m.y === y)) {
      if (isOnlineGame) onlineSend({ type: 'place', x, y, rot: currentRot });
      else applyPlace(x, y, currentRot);
    }
  }
  panRef = null;
  isPanning = false;
});
document.addEventListener('mouseup', (e) => { if (isPanning) { isPanning = false; panRef = null; } });
document.addEventListener('mousemove', (e) => {
  if (panRef && isPanning) { viewOX = panRef.ox + (e.clientX - panRef.sx); viewOY = panRef.oy + (e.clientY - panRef.sy); renderAll(); }
});
canvas.addEventListener('contextmenu', e => e.preventDefault());

function rotate() {
  if (!state || state.phase !== 'place') return;
  currentRot = (currentRot + 1) % 4;
  computeValidMoves();
  renderAll();
  drawCurrentTile();
}

document.getElementById('btn-rotate').addEventListener('click', rotate);
document.addEventListener('keydown', (e) => { if (e.key === 'r' || e.key === 'R') rotate(); });
document.getElementById('btn-restart').addEventListener('click', startGame);
document.getElementById('skip-meeple').addEventListener('click', () => {
  hideMeeplePanel();
  if (isOnlineGame) { onlineSend({ type: 'skip-meeple' }); } else { applyMeeple(null); }
});
document.getElementById('g-again').addEventListener('click', () => {
  document.getElementById('gov').classList.remove('show');
  if (!isOnlineGame) startGame();
});
document.getElementById('modes').addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (!b) return;
  mode = b.dataset.m;
  document.querySelectorAll('#modes button').forEach(x => x.classList.remove('on'));
  b.classList.add('on');
  startGame();
});

function startGame() {
  if (isOnlineGame) return;
  document.getElementById('gov').classList.remove('show');
  cpuLevel = mode === 'cpu1' ? 1 : mode === 'cpu2' ? 2 : mode === 'cpu3' ? 3 : 0;
  const nMap = { cpu1: 2, cpu2: 2, cpu3: 2, pvp2: 2, pvp3: 3, pvp4: 4 };
  initGame(nMap[mode] || 2);
  drawCurrentTile();
}

function handleOnlineMessage(fromSeat, msg) {
  if (msg.type === 'place') {
    currentRot = msg.rot;
    computeValidMoves();
    applyPlace(msg.x, msg.y, msg.rot);
  } else if (msg.type === 'meeple') {
    applyMeeple(msg.dir);
  } else if (msg.type === 'skip-meeple') {
    hideMeeplePanel();
    applyMeeple(null);
  }
  updateOnlineTurnBadge();
}

function updateOnlineTurnBadge() {
  if (!isOnlineGame || !state || !window.OnlineRoom || !OnlineRoom.setTurn) return;
  OnlineRoom.setTurn(state.phase !== 'end' && state.turn === myOnlineSeat);
}

function shouldOnlineCpuPlay() {
  if (!isOnlineGame || !state || state.phase === 'end') return false;
  if (myOnlineSeat !== 0) return false;
  const seat = state.turn;
  if (window.OnlineRoom && OnlineRoom.isAuto && OnlineRoom.isAuto(seat)) return true;
  return false;
}

function getOnlineState() {
  if (!state) return null;
  return {
    board: serializeBoard(),
    deck: state.deck.map(t => serializeTileDef(t)),
    nPlayers: state.nPlayers,
    scores: [...state.scores],
    meeples: [...state.meeples],
    turn: state.turn,
    phase: state.phase,
    currentTile: state.currentTile ? serializeTileDef(state.currentTile) : null,
    currentRot: currentRot,
    lastPlaced: state.lastPlaced ? { ...state.lastPlaced } : null,
  };
}

function serializeTileDef(t) {
  const o = { n:t.n, e:t.e, s:t.s, w:t.w, center:t.center,
    cityGroups: t.cityGroups.map(g=>[...g]),
    roadGroups: t.roadGroups.map(g=>[...g]),
    count: t.count };
  if (t.shield) o.shield = true;
  return o;
}

function serializeBoard() {
  const out = {};
  for (const key of Object.keys(state.board)) {
    const cell = state.board[key];
    out[key] = {
      tile: serializeTileDef(cell.tile),
      rot: cell.rot,
      meeple: cell.meeple ? { seat: cell.meeple.seat, dir: cell.meeple.dir } : null,
    };
  }
  return out;
}

function applyOnlineState(o) {
  isOnlineGame = true;
  myOnlineSeat = o.seat;
  onlineSend = o.send;
  onlineNcpus = 0;
  document.getElementById('modes').style.display = 'none';
  const s = o.state;
  if (!s) return;
  const board = {};
  for (const key of Object.keys(s.board)) {
    const c = s.board[key];
    board[key] = { tile: c.tile, rot: c.rot, meeple: c.meeple };
  }
  state = {
    board, deck: s.deck || [], nPlayers: s.nPlayers,
    scores: s.scores, meeples: s.meeples, turn: s.turn, phase: s.phase,
    currentTile: s.currentTile, currentRot: s.currentRot || 0, lastPlaced: s.lastPlaced,
  };
  currentRot = s.currentRot || 0;
  placingPhase = state.phase === 'meeple';
  computeValidMoves();
  centerView();
  renderAll();
  updateHUD();
  updateMsg();
  drawCurrentTile();
  updateOnlineTurnBadge();
  if (state.phase === 'end') showEndOverlay();
  else if (shouldOnlineCpuPlay()) setTimeout(doCPUTurn, 500);
}

startGame();
</script>

<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script src="../../shared/lobby.js?v=8"></script>
<script src="../../shared/online-room.js"></script>
<script>
OnlineRoom.init({
  gameId: 'carcassonne',
  minPlayers: 1,
  maxPlayers: 4,
  note: '2-4 players (CPU available)',
  onStart(seat, nPlayers, send, nCpus) {
    isOnlineGame = true;
    myOnlineSeat = seat;
    onlineSend = send;
    onlineNcpus = nCpus || 0;
    document.getElementById('modes').style.display = 'none';
    initGame(nPlayers);
    drawCurrentTile();
    updateOnlineTurnBadge();
    if (seat === 0 && onlineNcpus > 0 && state.turn >= nPlayers - onlineNcpus) {
      setTimeout(doCPUTurn, 500);
    }
  },
  onMessage(fromSeat, msg) {
    handleOnlineMessage(fromSeat, msg);
  },
  onLeft(seat) {
    document.getElementById('msg').textContent = `Player ${PLAYER_NAMES[seat]} has left`;
    updateOnlineTurnBadge();
    if (shouldOnlineCpuPlay()) setTimeout(doCPUTurn, 500);
  },
  getState: getOnlineState,
  applyState: applyOnlineState,
});
</script>
