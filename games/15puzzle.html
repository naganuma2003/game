ÔĽŅ<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>15„ÉĎ„āļ„Éę</title>
<style>
:root{--bg:#0e0e18;--surf:#1a1a28;--gold:#c9a030;--gold2:#f0d060;--txt:#e8e8f0;--dim:#555;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI','Hiragino Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:56px 12px 40px}
.back{position:fixed;top:12px;left:12px;z-index:999;background:rgba(0,0,0,.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,.25)}
h1{font-size:22px;color:var(--gold);margin-bottom:6px;text-align:center}
.subtitle{font-size:12px;color:var(--dim);text-align:center;margin-bottom:20px}

/* Size selector */
.size-row{display:flex;gap:8px;margin-bottom:20px}
.size-btn{padding:7px 18px;background:var(--surf);border:1px solid #333;color:var(--txt);border-radius:999px;cursor:pointer;font:600 13px 'Segoe UI',sans-serif;transition:all .15s}
.size-btn.on{background:rgba(201,160,48,.2);border-color:var(--gold);color:var(--gold)}
.size-btn:hover{border-color:var(--gold)}

/* Stats */
.stats{display:flex;gap:20px;margin-bottom:16px;font-size:13px;color:var(--dim)}
.stat span{color:var(--txt);font-weight:700}

/* Board */
#board-wrap{position:relative}
#board{display:grid;gap:6px;padding:10px;background:var(--surf);border-radius:16px}
.tile{display:flex;align-items:center;justify-content:center;border-radius:10px;font-weight:800;cursor:pointer;user-select:none;transition:transform .1s,background .15s;background:linear-gradient(135deg,#252538,#1e1e30);border:1px solid rgba(255,255,255,.08);color:var(--txt)}
.tile:hover:not(.empty){background:linear-gradient(135deg,#2e2e48,#252540);transform:scale(1.03)}
.tile.empty{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.04);cursor:default}
.tile.correct{background:linear-gradient(135deg,#1a3a1a,#162816);border-color:rgba(78,192,94,.3);color:#4ec05e}
.tile.moving{transform:scale(0.95)}

/* Buttons */
.btns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.gbtn{padding:9px 20px;border:none;border-radius:10px;font:700 13px 'Segoe UI',sans-serif;cursor:pointer}
.gbtn.primary{background:var(--gold);color:#111}
.gbtn.primary:hover{background:var(--gold2)}
.gbtn.secondary{background:var(--surf);color:var(--txt);border:1px solid #333}
.gbtn.secondary:hover{border-color:var(--gold)}

/* Solve animation */
.tile.hint{border-color:var(--gold);color:var(--gold)}
#ai-stop-btn{border-color:rgba(224,80,80,.5)!important;color:#e05050!important}
#ai-stop-btn:hover{border-color:#e05050!important}

/* Win banner */
#win{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#win.show{display:flex}
#win-box{background:var(--surf);border-radius:16px;padding:32px;text-align:center;max-width:320px}
#win-box h2{color:var(--gold);font-size:24px;margin-bottom:8px}
#win-box p{color:var(--dim);font-size:14px;margin-bottom:20px}
#win-box .gbtn{margin:4px}

/* Opponent board panel (persistent, below main board) */
#opp-section{display:none;width:100%;max-width:400px;margin-top:20px;text-align:center}
.opp-header{display:flex;align-items:center;justify-content:center;gap:10px;font-size:12px;color:var(--dim);margin-bottom:8px}
.opp-header .opp-label{font-weight:700;color:var(--gold2)}
.opp-header .opp-info{font-size:11px;color:var(--dim)}
#opp-mini-board{display:inline-grid;gap:3px;padding:8px;background:var(--surf);border-radius:12px}
.opp-tile{display:flex;align-items:center;justify-content:center;border-radius:5px;font-weight:800;background:linear-gradient(135deg,#252538,#1e1e30);border:1px solid rgba(255,255,255,.08);color:var(--txt)}
.opp-tile.empty{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.04)}
.opp-tile.correct{background:linear-gradient(135deg,#1a3a1a,#162816);border-color:rgba(78,192,94,.3);color:#4ec05e}

/* Mode select modal */
#mode-select{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:300;align-items:center;justify-content:center;padding:16px}
#mode-select.show{display:flex}
.mode-box{background:var(--surf);border-radius:16px;padding:24px 20px;max-width:300px;width:100%;text-align:center}
.mode-box h3{color:var(--gold);font-size:17px;margin-bottom:6px}
.mode-box p{font-size:12px;color:var(--dim);margin-bottom:20px;line-height:1.6}
.mode-btns{display:flex;flex-direction:column;gap:10px}
.mode-btn{padding:14px;border:none;border-radius:10px;font:700 14px 'Segoe UI',sans-serif;cursor:pointer;transition:all .12s}
.mode-btn.same{background:var(--gold);color:#111}
.mode-btn.same:hover{background:var(--gold2)}
.mode-btn.rand{background:#2a2a3e;color:var(--txt);border:1px solid #444}
.mode-btn.rand:hover{border-color:var(--gold)}

@media(max-width:480px){
  h1{font-size:20px;letter-spacing:.2em;text-indent:.2em}
  .modes,.row{flex-wrap:wrap;justify-content:center}
  .modes button,.row button,.foot button{min-height:44px}
}
</style>
</head>
<body>
<a href="../index.html" class="back">‚Üź šłÄŤ¶ß„ĀęśąĽ„āč</a>
<h1>15„ÉĎ„āļ„Éę</h1>
<p class="subtitle">śēįŚ≠ó„āíť†ÜÁē™„Āęšł¶„ĀĻ„āą„ĀÜ</p>

<div class="size-row">
  <button class="size-btn" onclick="setSize(3)">3√ó3</button>
  <button class="size-btn on" onclick="setSize(4)">4√ó4</button>
  <button class="size-btn" onclick="setSize(5)">5√ó5</button>
</div>

<div class="stats">
  <div>śČčśēį: <span id="moves">0</span></div>
  <div>śôāťĖď: <span id="timer">0:00</span></div>
  <div id="best-wrap">„Éô„āĻ„Éą: <span id="best">-</span></div>
</div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div class="btns">
  <button class="gbtn primary" onclick="newGame()">„ā∑„É£„ÉÉ„Éē„Éę</button>
  <button class="gbtn secondary" onclick="showHint()">„Éí„É≥„Éą</button>
  <button class="gbtn secondary" id="ai-best-btn" onclick="showBestMove()">śúÄŚĖĄśČč</button>
  <button class="gbtn secondary" id="ai-slow-btn" onclick="startAI(500)">AI(ťĀÖ)</button>
  <button class="gbtn secondary" id="ai-fast-btn" onclick="startAI(100)">AI(ťÄü)</button>
  <button class="gbtn secondary" id="ai-stop-btn" onclick="stopAI()" style="display:none">ŚĀúś≠Ę</button>
</div>

<!-- ÁõłśČč„ĀģÁõ§ťĚĘÔľąŚłłśôāŤ°®Á§ļ„ÉĎ„Éć„ÉęÔľČ -->
<div id="opp-section">
  <div class="opp-header">
    <span class="opp-label">ÁõłśČč„ĀģÁõ§ťĚĘ</span>
    <span class="opp-info" id="opp-info">-</span>
  </div>
  <div id="opp-mini-board"></div>
</div>

<!-- ŚĮĺśą¶ŚĹĘŚľŹťĀłśäě„ÉĘ„Éľ„ÉÄ„ÉęÔľą„Éõ„āĻ„Éą„Āģ„ĀŅŤ°®Á§ļÔľČ -->
<div id="mode-select">
  <div class="mode-box">
    <h3>ŚĮĺśą¶ŚĹĘŚľŹ„āíťĀłśäě</h3>
    <p>„Éõ„āĻ„Éą„ĀĆťĀł„āď„Ā†ŚĹĘŚľŹ„ĀßŚĮĺśą¶„ĀĆŚßč„Āĺ„āä„Āĺ„Āô</p>
    <div class="mode-btns">
      <button class="mode-btn same" onclick="startRace('same')">ŚźĆ„ĀėÁõ§ťĚĘ„Āß„āĻ„āŅ„Éľ„Éą<br><span style="font-size:11px;font-weight:400;opacity:.8">šļĆšļļ„ĀĆŚźĆ„Āė„ÉĎ„āļ„Éę„āíŤß£„ĀŹ</span></button>
      <button class="mode-btn rand" onclick="startRace('random')">„ĀĚ„āĆ„Āě„āĆ„É©„É≥„ÉÄ„É†„Ā™Áõ§ťĚĘ<br><span style="font-size:11px;font-weight:400;opacity:.8">Áēį„Ā™„āč„ÉĎ„āļ„Éę„āíŤß£„ĀŹ</span></button>
    </div>
  </div>
</div>

<div id="win">
  <div id="win-box">
    <h2>„āĮ„É™„āĘÔľĀūüéČ</h2>
    <p id="win-msg"></p>
    <button class="gbtn primary" onclick="newGame();closeWin()">„āā„ĀÜšłÄŚļ¶</button>
    <button class="gbtn secondary" onclick="closeWin()">„ĀĚ„Āģ„Āĺ„ĀĺŤ¶č„āč</button>
  </div>
</div>

<script>
let N=4,tiles=[],moveCount=0,timerSec=0,timerInt=null,started=false;
let bestMoves={3:null,4:null,5:null};

function setSize(n){
  N=n;
  document.querySelectorAll('.size-btn').forEach((b,i)=>{
    b.classList.toggle('on',[3,4,5][i]===n);
  });
  newGame();
}

function newGame(){
  stopAI();
  clearInterval(timerInt);started=false;moveCount=0;timerSec=0;
  document.getElementById('moves').textContent='0';
  document.getElementById('timer').textContent='0:00';
  updateBest();
  tiles=shuffle(makeSolved());
  render();
}

function makeSolved(){
  const t=[];
  for(let i=1;i<N*N;i++)t.push(i);
  t.push(0);
  return t;
}

function shuffle(t){
  const a=[...t];
  do{
    for(let i=a.length-1;i>0;i--){const j=Math.random()*i|0;[a[i],a[j]]=[a[j],a[i]];}
  }while(!isSolvable(a)||isSolved(a));
  return a;
}

function isSolvable(t){
  let inv=0;
  const flat=t.filter(x=>x!==0);
  for(let i=0;i<flat.length;i++) for(let j=i+1;j<flat.length;j++) if(flat[i]>flat[j]) inv++;
  const blankRow=Math.floor(t.indexOf(0)/N);
  if(N%2===1) return inv%2===0;
  return (inv+(N-1-blankRow))%2===0;
}

function isSolved(t){
  for(let i=0;i<t.length-1;i++) if(t[i]!==i+1) return false;
  return t[t.length-1]===0;
}

function render(){
  const board=document.getElementById('board');
  const cs=Math.min(Math.floor((Math.min(window.innerWidth-40,400)-20-6*(N-1))/N),90);
  board.style.gridTemplateColumns=`repeat(${N},${cs}px)`;
  board.style.gridTemplateRows=`repeat(${N},${cs}px)`;
  board.style.gap='6px';
  board.innerHTML='';
  tiles.forEach((v,i)=>{
    const el=document.createElement('div');
    el.className='tile'+(v===0?' empty':v===i+1?' correct':'');
    el.style.width=cs+'px';el.style.height=cs+'px';
    el.style.fontSize=cs*0.38+'px';
    if(v!==0){
      el.textContent=v;
      el.addEventListener('click',()=>clickTile(i));
      el.addEventListener('touchstart',e=>{e.preventDefault();clickTile(i);},{passive:false});
    }
    board.appendChild(el);
  });
}

function startRaceTimer(){
  if(started)return;
  started=true;
  clearInterval(timerInt);
  timerInt=setInterval(()=>{
    timerSec++;
    const m=Math.floor(timerSec/60),s=timerSec%60;
    document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;
  },1000);
}

function clickTile(idx){
  const blank=tiles.indexOf(0);
  const r1=Math.floor(idx/N),c1=idx%N;
  const r2=Math.floor(blank/N),c2=blank%N;
  if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1)return;

  // „ā™„Éē„É©„ā§„É≥„Āģ„ĀŅśúÄŚąĚ„Āģ„āĮ„É™„ÉÉ„āĮ„Āß„āŅ„ā§„Éě„Éľ„āíťĖčŚßč
  if(!started&&!ONLINE){
    startRaceTimer();
  }

  [tiles[idx],tiles[blank]]=[tiles[blank],tiles[idx]];
  moveCount++;
  document.getElementById('moves').textContent=moveCount;

  const el=document.getElementById('board').children[idx];
  el.classList.add('moving');
  setTimeout(()=>{render();if(isSolved(tiles))win();},80);
}

function win(){
  stopAI();
  clearInterval(timerInt);
  clearInterval(peekInterval);
  if(ONLINE){
    if(raceOver)return;
    raceOver=true;
    roomSend({t:'done',moves:moveCount,sec:timerSec});
    const m=Math.floor(timerSec/60),s=timerSec%60;
    const st=createRaceStatus(`„Āā„Ā™„Āü„ĀģŚčĚ„Ā°ÔľĀ ${moveCount}śČč„ÉĽ${m}:${s<10?'0':''}${s}`);
    st.style.color='#4ec05e';
    document.getElementById('win-msg').textContent=`${moveCount}śČč„ÉĽ${m}:${s<10?'0':''}${s}„Āß„āĮ„É™„āĘÔľĀ`;
    document.getElementById('win-box').querySelector('h2').textContent='„Āā„Ā™„Āü„ĀģŚčĚ„Ā°ÔľĀ';
    document.getElementById('win').classList.add('show');
    try{if(window.OnlineRoom)window.OnlineRoom.clearSession();}catch(_){}
    return;
  }
  if(!bestMoves[N]||moveCount<bestMoves[N]){bestMoves[N]=moveCount;updateBest();}
  const m=Math.floor(timerSec/60),s=timerSec%60;
  document.getElementById('win-msg').textContent=`${moveCount}śČč„ÉĽ${m}:${s<10?'0':''}${s}„Āß„āĮ„É™„āĘÔľĀ`;
  document.getElementById('win').classList.add('show');
}

function closeWin(){document.getElementById('win').classList.remove('show');}

function updateBest(){
  const b=bestMoves[N];
  document.getElementById('best').textContent=b?b+'śČč':'-';
}

function showHint(){
  const blank=tiles.indexOf(0);
  const br=Math.floor(blank/N),bc=blank%N;
  const neighbors=[];
  if(br>0)neighbors.push(blank-N);
  if(br<N-1)neighbors.push(blank+N);
  if(bc>0)neighbors.push(blank-1);
  if(bc<N-1)neighbors.push(blank+1);
  let best=null,bestScore=Infinity;
  for(const n of neighbors){
    const v=tiles[n];
    const goalIdx=v-1;
    const gr=Math.floor(goalIdx/N),gc=goalIdx%N;
    const nr=Math.floor(n/N),nc=n%N;
    const dist=Math.abs(nr-gr)+Math.abs(nc-gc);
    if(dist<bestScore){bestScore=dist;best=n;}
  }
  if(best===null)return;
  const els=document.getElementById('board').children;
  els[best].classList.add('hint');
  setTimeout(()=>els[best]?.classList.remove('hint'),800);
}

// ===== ONLINE RACE MODE =====
let ONLINE=false,MYSEAT=0,roomSend=null,raceOver=false;
let peekInterval=null;

function sendPeek(){
  if(raceOver||!roomSend)return;
  roomSend({t:'peek',tiles:[...tiles],moves:moveCount,n:N});
}

function startPeekInterval(){
  clearInterval(peekInterval);
  sendPeek(); // Ść≥śôāťÄĀšŅ°Ôľą0ÁßíÔľČ
  peekInterval=setInterval(()=>{
    if(raceOver){clearInterval(peekInterval);return;}
    sendPeek();
  },30000); // šĽ•ťôć30Áßí„ĀĒ„Ā®
}

function renderOppMini(oppTiles,oppN){
  const mini=document.getElementById('opp-mini-board');
  const maxW=Math.min(window.innerWidth-80,200);
  const cs=Math.min(Math.floor((maxW-16-3*(oppN-1))/oppN),42);
  mini.style.gridTemplateColumns=`repeat(${oppN},${cs}px)`;
  mini.style.gridTemplateRows=`repeat(${oppN},${cs}px)`;
  mini.innerHTML='';
  oppTiles.forEach((v,i)=>{
    const el=document.createElement('div');
    el.className='opp-tile'+(v===0?' empty':v===i+1?' correct':'');
    el.style.width=cs+'px';el.style.height=cs+'px';
    el.style.fontSize=cs*0.38+'px';
    if(v!==0)el.textContent=v;
    mini.appendChild(el);
  });
}

function showOppSectionWaiting(n){
  // random„ÉĘ„Éľ„ÉČÁĒ®„Éó„É¨„Éľ„āĻ„Éõ„Éę„ÉÄ„ÉľÔľąÁ©ļ„āŅ„ā§„ÉęÔľČ
  const section=document.getElementById('opp-section');
  section.style.display='block';
  document.getElementById('opp-info').textContent='ŚŹóšŅ°šł≠‚Ä¶';
  const dummy=[];
  for(let i=0;i<n*n-1;i++)dummy.push(i+1);
  dummy.push(0);
  renderOppMini(dummy,n);
}

function showOpponentBoard(oppTiles,oppMoves,oppN){
  const section=document.getElementById('opp-section');
  section.style.display='block';
  const solved=oppTiles.filter((v,i)=>v!==0&&v===i+1).length;
  document.getElementById('opp-info').textContent=`${oppMoves}śČč„ÉĽ${solved}/${oppN*oppN-1}„Éě„āĻŚģĆśąź`;
  renderOppMini(oppTiles,oppN);
}

function onStart(seat,n,send){
  stopAI();
  ONLINE=true;MYSEAT=seat;roomSend=send;raceOver=false;
  document.querySelector('.size-row').style.display='none';
  document.querySelectorAll('.btns .gbtn.secondary').forEach(b=>b.style.display='none');
  document.getElementById('best-wrap').style.display='none';
  document.getElementById('opp-section').style.display='none';
  if(seat===0){
    // „Éõ„āĻ„Éą„Āģ„ĀŅŚĹĘŚľŹťĀłśäě„āíŤ°®Á§ļ
    document.getElementById('mode-select').classList.add('show');
  } else {
    document.getElementById('board').innerHTML='';
    document.getElementById('status-race')||createRaceStatus('ŚĮĺśą¶ÁõłśČč„āíŚĺÖś©üšł≠‚Ä¶');
  }
}

function startRace(mode){
  document.getElementById('mode-select').classList.remove('show');
  clearInterval(timerInt);timerSec=0;moveCount=0;started=false;
  document.getElementById('moves').textContent='0';
  document.getElementById('timer').textContent='0:00';

  if(mode==='same'){
    const t=shuffle(makeSolved());
    tiles=[...t];
    render();
    createRaceStatus('„āĻ„āŅ„Éľ„ÉąÔľĀŚÖą„ĀęśŹÉ„Āą„ĀüśĖĻ„ĀģŚčĚ„Ā°ÔľąŚźĆ„ĀėÁõ§ťĚĘÔľČ');
    showOpponentBoard([...t],0,N); // ŚźĆ„ĀėÁõ§ťĚĘ„Ā™„Āģ„ĀßŚć≥Ť°®Á§ļ
    roomSend({t:'start',mode:'same',tiles:t,n:N});
  } else {
    tiles=shuffle(makeSolved());
    render();
    createRaceStatus('„āĻ„āŅ„Éľ„ÉąÔľĀŚÖą„ĀęśŹÉ„Āą„ĀüśĖĻ„ĀģŚčĚ„Ā°Ôľą„É©„É≥„ÉÄ„É†Áõ§ťĚĘÔľČ');
    showOppSectionWaiting(N); // ŚŹóšŅ°ŚĺÖ„Ā°„Éó„É¨„Éľ„āĻ„Éõ„Éę„ÉÄ„Éľ
    roomSend({t:'start',mode:'random',n:N});
  }
  startRaceTimer();
  startPeekInterval();
}

function createRaceStatus(msg){
  let el=document.getElementById('status-race');
  if(!el){el=document.createElement('div');el.id='status-race';
    el.style.cssText='text-align:center;padding:10px 0;font-size:14px;color:var(--gold2)';
    document.getElementById('board-wrap').after(el);}
  el.textContent=msg;
  return el;
}

function handleMsg(from,msg){
  if(msg.t==='start'){
    clearInterval(timerInt);timerSec=0;moveCount=0;started=false;
    document.getElementById('moves').textContent='0';
    document.getElementById('timer').textContent='0:00';
    if(msg.mode==='same'){
      N=msg.n||N;
      tiles=[...msg.tiles];
      render();
      createRaceStatus('„āĻ„āŅ„Éľ„ÉąÔľĀŚÖą„ĀęśŹÉ„Āą„ĀüśĖĻ„ĀģŚčĚ„Ā°ÔľąŚźĆ„ĀėÁõ§ťĚĘÔľČ');
      showOpponentBoard([...tiles],0,N); // ŚźĆ„ĀėÁõ§ťĚĘ„Ā™„Āģ„ĀßŚć≥Ť°®Á§ļ
    } else {
      N=msg.n||N;
      tiles=shuffle(makeSolved());
      render();
      createRaceStatus('„āĻ„āŅ„Éľ„ÉąÔľĀŚÖą„ĀęśŹÉ„Āą„ĀüśĖĻ„ĀģŚčĚ„Ā°Ôľą„É©„É≥„ÉÄ„É†Áõ§ťĚĘÔľČ');
      showOppSectionWaiting(N); // ŚŹóšŅ°ŚĺÖ„Ā°„Éó„É¨„Éľ„āĻ„Éõ„Éę„ÉÄ„Éľ
    }
    startRaceTimer();
    startPeekInterval();
  } else if(msg.t==='peek'){
    showOpponentBoard(msg.tiles,msg.moves,msg.n||N);
  } else if(msg.t==='done'){
    if(raceOver)return;raceOver=true;
    clearInterval(peekInterval);
    clearInterval(timerInt);

    document.getElementById('win-box').querySelector('h2').textContent=myWin?'„Āā„Ā™„Āü„ĀģŚčĚ„Ā°ÔľĀ':'śÉú„Āó„ĀĄ‚Ä¶';
    try{if(window.OnlineRoom)window.OnlineRoom.clearSession();}catch(_){}
  }
}

// ===== AI SOLVER (IDA* + greedy fallback) =====
let aiInterval = null;
const _SLIM = 600000;
let _sN = 0, _sAbort = false;

function _mh(t) {
  let h = 0;
  for (let i = 0; i < t.length; i++) {
    if (!t[i]) continue;
    const v = t[i]-1;
    h += Math.abs((i/N|0)-(v/N|0)) + Math.abs(i%N-v%N);
  }
  return h;
}

function _ida(t, blank, g, bound, path, prev) {
  if (++_sN > _SLIM) { _sAbort = true; return 0; }
  const h = _mh(t), f = g+h;
  if (f > bound) return f;
  if (!h) return -1;
  const br = blank/N|0, bc = blank%N;
  const nb = [];
  if (br > 0) nb.push(blank-N);
  if (br < N-1) nb.push(blank+N);
  if (bc > 0) nb.push(blank-1);
  if (bc < N-1) nb.push(blank+1);
  let min = Infinity;
  for (const nx of nb) {
    if (nx === prev) continue;
    [t[blank],t[nx]] = [t[nx],t[blank]];
    path.push(nx);
    const r = _ida(t, nx, g+1, bound, path, blank);
    if (r === -1) return -1;
    if (_sAbort) return 0;
    if (r < min) min = r;
    [t[blank],t[nx]] = [t[nx],t[blank]];
    path.pop();
  }
  return min;
}

function _greedy(st) {
  const t = [...st], path = [], vis = new Set([t.join(',')]);
  for (let s = 0; s < 5000 && !isSolved(t); s++) {
    const blank = t.indexOf(0);
    const br = blank/N|0, bc = blank%N;
    const nb = [];
    if (br > 0) nb.push(blank-N);
    if (br < N-1) nb.push(blank+N);
    if (bc > 0) nb.push(blank-1);
    if (bc < N-1) nb.push(blank+1);
    let best = null, bestH = Infinity, sawNew = false;
    for (const nx of nb) {
      [t[blank],t[nx]] = [t[nx],t[blank]];
      const h = _mh(t), isV = vis.has(t.join(','));
      if (!isV && (!sawNew || h < bestH)) { bestH = h; best = nx; sawNew = true; }
      else if (!sawNew && h < bestH) { bestH = h; best = nx; }
      [t[blank],t[nx]] = [t[nx],t[blank]];
    }
    if (!best) best = nb[0];
    [t[blank],t[best]] = [t[best],t[blank]];
    path.push(best); vis.add(t.join(','));
  }
  return path;
}

function _solve() {
  if (isSolved(tiles)) return [];
  if (N >= 5) return _greedy(tiles);
  const t = [...tiles];
  let bound = _mh(t);
  const path = [];
  _sAbort = false;
  while (!_sAbort && bound < 150) {
    _sN = 0;
    const r = _ida(t, t.indexOf(0), 0, bound, path, -1);
    if (r === -1) return path;
    if (_sAbort) break;
    bound = r;
  }
  return _greedy(tiles);
}

function _setAIUI(running) {
  ['ai-slow-btn','ai-fast-btn','ai-best-btn'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.display = running ? 'none' : '';
  });
  const s = document.getElementById('ai-stop-btn');
  if (s) s.style.display = running ? '' : 'none';
}

function startAI(delay) {
  stopAI();
  const sol = _solve();
  if (!sol.length) return;
  let idx = 0;
  _setAIUI(true);
  aiInterval = setInterval(() => {
    if (idx >= sol.length || isSolved(tiles)) { stopAI(); return; }
    clickTile(sol[idx++]);
  }, delay);
}

function stopAI() {
  clearInterval(aiInterval); aiInterval = null;
  _setAIUI(false);
}

function showBestMove() {
  const sol = _solve();
  if (!sol.length) return;
  const els = document.getElementById('board').children;
  els[sol[0]]?.classList.add('hint');
  setTimeout(() => els[sol[0]]?.classList.remove('hint'), 900);
}

// Keyboard
document.addEventListener('keydown',e=>{
  const blank=tiles.indexOf(0);
  const br=Math.floor(blank/N),bc=blank%N;
  let target=-1;
  if(e.key==='ArrowUp'&&br<N-1)target=blank+N;
  if(e.key==='ArrowDown'&&br>0)target=blank-N;
  if(e.key==='ArrowLeft'&&bc<N-1)target=blank+1;
  if(e.key==='ArrowRight'&&bc>0)target=blank-1;
  if(target>=0)clickTile(target);
});
