<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>15パズル</title>
<style>
:root{--bg:#0e0e18;--surf:#1a1a28;--gold:#c9a030;--gold2:#f0d060;--txt:#e8e8f0;--dim:#555;}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI','Hiragino Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:56px 12px 40px}
.back{position:fixed;top:12px;left:12px;z-index:999;background:rgba(0,0,0,.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,.25)}
h1{font-size:22px;color:var(--gold);margin-bottom:6px;text-align:center}
.subtitle{font-size:12px;color:var(--dim);text-align:center;margin-bottom:20px}

/* Size selector */
.size-row{display:flex;gap:8px;margin-bottom:20px}
.size-btn{padding:7px 18px;background:var(--surf);border:1px solid #333;color:var(--txt);border-radius:999px;cursor:pointer;font:600 13px 'Segoe UI',sans-serif;transition:all .15s}
.size-btn.on{background:rgba(201,160,48,.2);border-color:var(--gold);color:var(--gold)}
.size-btn:hover{border-color:var(--gold)}

/* Stats */
.stats{display:flex;gap:20px;margin-bottom:16px;font-size:13px;color:var(--dim)}
.stat span{color:var(--txt);font-weight:700}

/* Board */
#board-wrap{position:relative}
#board{display:grid;gap:6px;padding:10px;background:var(--surf);border-radius:16px}
.tile{display:flex;align-items:center;justify-content:center;border-radius:10px;font-weight:800;cursor:pointer;user-select:none;transition:transform .1s,background .15s;background:linear-gradient(135deg,#252538,#1e1e30);border:1px solid rgba(255,255,255,.08);color:var(--txt)}
.tile:hover:not(.empty){background:linear-gradient(135deg,#2e2e48,#252540);transform:scale(1.03)}
.tile.empty{background:rgba(255,255,255,.03);border-color:rgba(255,255,255,.04);cursor:default}
.tile.correct{background:linear-gradient(135deg,#1a3a1a,#162816);border-color:rgba(78,192,94,.3);color:#4ec05e}
.tile.moving{transform:scale(0.95)}

/* Buttons */
.btns{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap;justify-content:center}
.gbtn{padding:9px 20px;border:none;border-radius:10px;font:700 13px 'Segoe UI',sans-serif;cursor:pointer}
.gbtn.primary{background:var(--gold);color:#111}
.gbtn.primary:hover{background:var(--gold2)}
.gbtn.secondary{background:var(--surf);color:var(--txt);border:1px solid #333}
.gbtn.secondary:hover{border-color:var(--gold)}

/* Solve animation */
.tile.hint{border-color:var(--gold);color:var(--gold)}

/* Win banner */
#win{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
#win.show{display:flex}
#win-box{background:var(--surf);border-radius:16px;padding:32px;text-align:center;max-width:320px}
#win-box h2{color:var(--gold);font-size:24px;margin-bottom:8px}
#win-box p{color:var(--dim);font-size:14px;margin-bottom:20px}
#win-box .gbtn{margin:4px}

/* Timer done */
</style>
</head>
<body>
<a href="../index.html" class="back">← 一覧に戻る</a>
<h1>15パズル</h1>
<p class="subtitle">数字を順番に並べよう</p>

<div class="size-row">
  <button class="size-btn" onclick="setSize(3)">3×3</button>
  <button class="size-btn on" onclick="setSize(4)">4×4</button>
  <button class="size-btn" onclick="setSize(5)">5×5</button>
</div>

<div class="stats">
  <div>手数: <span id="moves">0</span></div>
  <div>時間: <span id="timer">0:00</span></div>
  <div id="best-wrap">ベスト: <span id="best">-</span></div>
</div>

<div id="board-wrap">
  <div id="board"></div>
</div>

<div class="btns">
  <button class="gbtn primary" onclick="newGame()">シャッフル</button>
  <button class="gbtn secondary" onclick="showHint()">ヒント</button>
</div>

<div id="win">
  <div id="win-box">
    <h2>クリア！🎉</h2>
    <p id="win-msg"></p>
    <button class="gbtn primary" onclick="newGame();closeWin()">もう一度</button>
    <button class="gbtn secondary" onclick="closeWin()">そのまま見る</button>
  </div>
</div>

<script>
let N=4,tiles=[],moveCount=0,timerSec=0,timerInt=null,started=false;
let bestMoves={3:null,4:null,5:null};

function setSize(n){
  N=n;
  document.querySelectorAll('.size-btn').forEach((b,i)=>{
    b.classList.toggle('on',[3,4,5][i]===n);
  });
  newGame();
}

function newGame(){
  clearInterval(timerInt);started=false;moveCount=0;timerSec=0;
  document.getElementById('moves').textContent='0';
  document.getElementById('timer').textContent='0:00';
  updateBest();
  tiles=shuffle(makeSolved());
  render();
}

function makeSolved(){
  const t=[];
  for(let i=1;i<N*N;i++)t.push(i);
  t.push(0);
  return t;
}

function shuffle(t){
  const a=[...t];
  // Fisher-Yates, ensure solvable
  do{
    for(let i=a.length-1;i>0;i--){const j=Math.random()*i|0;[a[i],a[j]]=[a[j],a[i]];}
  }while(!isSolvable(a)||isSolved(a));
  return a;
}

function isSolvable(t){
  let inv=0;
  const flat=t.filter(x=>x!==0);
  for(let i=0;i<flat.length;i++) for(let j=i+1;j<flat.length;j++) if(flat[i]>flat[j]) inv++;
  const blankRow=Math.floor(t.indexOf(0)/N);
  if(N%2===1) return inv%2===0;
  return (inv+(N-1-blankRow))%2===0;
}

function isSolved(t){
  for(let i=0;i<t.length-1;i++) if(t[i]!==i+1) return false;
  return t[t.length-1]===0;
}

function render(){
  const board=document.getElementById('board');
  const cs=Math.min(Math.floor((Math.min(window.innerWidth-40,400)-20-6*(N-1))/N),90);
  board.style.gridTemplateColumns=`repeat(${N},${cs}px)`;
  board.style.gridTemplateRows=`repeat(${N},${cs}px)`;
  board.style.gap='6px';
  board.innerHTML='';
  tiles.forEach((v,i)=>{
    const el=document.createElement('div');
    el.className='tile'+(v===0?' empty':v===i+1?' correct':'');
    el.style.width=cs+'px';el.style.height=cs+'px';
    el.style.fontSize=cs*0.38+'px';
    if(v!==0){
      el.textContent=v;
      el.addEventListener('click',()=>clickTile(i));
      el.addEventListener('touchstart',e=>{e.preventDefault();clickTile(i);},{passive:false});
    }
    board.appendChild(el);
  });
}

function clickTile(idx){
  const blank=tiles.indexOf(0);
  const r1=Math.floor(idx/N),c1=idx%N;
  const r2=Math.floor(blank/N),c2=blank%N;
  if(Math.abs(r1-r2)+Math.abs(c1-c2)!==1)return;

  if(!started){
    started=true;
    timerInt=setInterval(()=>{
      timerSec++;
      const m=Math.floor(timerSec/60),s=timerSec%60;
      document.getElementById('timer').textContent=m+':'+(s<10?'0':'')+s;
    },1000);
  }

  [tiles[idx],tiles[blank]]=[tiles[blank],tiles[idx]];
  moveCount++;
  document.getElementById('moves').textContent=moveCount;

  // Animate
  const el=document.getElementById('board').children[idx];
  el.classList.add('moving');
  setTimeout(()=>{render();if(isSolved(tiles))win();},80);
}

function win(){
  clearInterval(timerInt);
  const bk=N+'x'+N;
  if(!bestMoves[N]||moveCount<bestMoves[N]){bestMoves[N]=moveCount;updateBest();}
  const m=Math.floor(timerSec/60),s=timerSec%60;
  document.getElementById('win-msg').textContent=`${moveCount}手・${m}:${s<10?'0':''}${s}でクリア！`;
  document.getElementById('win').classList.add('show');
}

function closeWin(){document.getElementById('win').classList.remove('show');}

function updateBest(){
  const b=bestMoves[N];
  document.getElementById('best').textContent=b?b+'手':'-';
}

function showHint(){
  // Highlight the tile that should move (closest to solved)
  const blank=tiles.indexOf(0);
  const br=Math.floor(blank/N),bc=blank%N;
  const neighbors=[];
  if(br>0)neighbors.push(blank-N);
  if(br<N-1)neighbors.push(blank+N);
  if(bc>0)neighbors.push(blank-1);
  if(bc<N-1)neighbors.push(blank+1);

  // Pick neighbor whose value belongs closest to blank position
  let best=null,bestScore=Infinity;
  for(const n of neighbors){
    const v=tiles[n];
    const goalIdx=v-1; // 0-indexed goal position
    const gr=Math.floor(goalIdx/N),gc=goalIdx%N;
    const nr=Math.floor(n/N),nc=n%N;
    const dist=Math.abs(nr-gr)+Math.abs(nc-gc);
    if(dist<bestScore){bestScore=dist;best=n;}
  }
  if(best===null)return;
  const els=document.getElementById('board').children;
  els[best].classList.add('hint');
  setTimeout(()=>els[best]?.classList.remove('hint'),800);
}

// Keyboard
document.addEventListener('keydown',e=>{
  const blank=tiles.indexOf(0);
  const br=Math.floor(blank/N),bc=blank%N;
  let target=-1;
  if(e.key==='ArrowUp'&&br<N-1)target=blank+N;
  if(e.key==='ArrowDown'&&br>0)target=blank-N;
  if(e.key==='ArrowLeft'&&bc<N-1)target=blank+1;
  if(e.key==='ArrowRight'&&bc>0)target=blank-1;
  if(target>=0)clickTile(target);
});

// Init
newGame();
</script>
</body>
</html>
