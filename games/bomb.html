<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ボム 1/16</title>
<style>
  :root{
    --hazard1:#f2c200; --hazard2:#1a1a1a;
    --panel-hi:#cfcfcf; --panel:#b8b8b8; --panel-lo:#9a9a9a;
    --bezel-hi:#d8d8d8; --bezel:#8f8f8f; --bezel-lo:#6a6a6a;
    --red-hi:#ff5b4d; --red:#e0231a; --red-lo:#9c0f08;
    --green-hi:#6be06a; --green:#27a52a; --green-lo:#0d5e12;
    --ink:#1a1a1a;
    --font:"Helvetica Neue",Arial,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:#2a2a2a;color:var(--ink);font-family:var(--font);
    min-height:100%;overflow:hidden;user-select:none;
    display:flex;align-items:center;justify-content:center;
  }
  .machine{
    position:relative;width:100%;max-width:460px;height:100dvh;max-height:920px;
    padding:18px;display:flex;flex-direction:column;
    background:
      repeating-linear-gradient(45deg,
        var(--hazard1) 0 22px, var(--hazard2) 22px 44px);
    border-radius:6px;
  }
  .panel{
    position:relative;flex:1;border-radius:8px;padding:18px 16px;
    display:flex;flex-direction:column;
    background:linear-gradient(160deg,var(--panel-hi),var(--panel-lo));
    box-shadow:inset 0 2px 4px rgba(255,255,255,.6),
      inset 0 -3px 8px rgba(0,0,0,.35),
      0 0 0 2px rgba(0,0,0,.25);
  }
  .hud{
    display:flex;justify-content:space-between;align-items:center;
    padding:2px 4px 14px;font-weight:800;
  }
  .hud .label{font-size:11px;letter-spacing:.3em;color:#555;}
  .hud .count{font-size:15px;color:#333;font-variant-numeric:tabular-nums;}
  .status{
    text-align:center;font-size:14px;font-weight:800;min-height:20px;
    color:#444;padding-bottom:10px;letter-spacing:.02em;
  }
  .status.boom{color:var(--red-lo);}
  .status.win{color:var(--green-lo);}

  .grid{
    flex:1;display:grid;grid-template-columns:repeat(4,1fr);
    grid-template-rows:repeat(4,1fr);gap:8px;
    place-items:center;width:100%;
  }
  .slot{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}

  .btn{
    position:relative;width:94%;aspect-ratio:1/1;border:none;cursor:pointer;
    border-radius:50%;padding:0;background:transparent;
    transform-origin:center;
  }
  .btn:disabled{cursor:default;}
  .btn .bezel{
    position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 50% 45%,var(--panel-lo),var(--bezel-lo) 75%,var(--bezel) 100%);
    box-shadow:inset 0 3px 6px rgba(0,0,0,.55),
      inset 0 -2px 3px rgba(255,255,255,.45),
      0 1px 2px rgba(255,255,255,.4);
  }
  .btn .cap{
    position:absolute;inset:8%;border-radius:50%;
    background:radial-gradient(circle at 38% 30%,var(--red-hi),var(--red) 55%,var(--red-lo));
    box-shadow:inset 0 3px 6px rgba(255,255,255,.45),
      inset 0 -6px 10px rgba(0,0,0,.5),
      0 5px 7px rgba(0,0,0,.45);
    transition:transform .07s ease, box-shadow .07s ease, opacity .25s ease;
    display:flex;align-items:center;justify-content:center;
    font-size:0;
  }
  .btn .cap .mark{
    font-size:clamp(16px,5vw,26px);opacity:0;transform:scale(.4);
    transition:opacity .15s, transform .25s cubic-bezier(.34,1.56,.64,1);
  }
  .btn:active:not(:disabled) .cap{
    transform:translateY(3px) scale(.97);
    box-shadow:inset 0 4px 8px rgba(0,0,0,.55), 0 1px 2px rgba(0,0,0,.4);
  }
  .btn.pressed .cap{
    transform:translateY(4px) scale(.96);
    box-shadow:inset 0 5px 9px rgba(0,0,0,.6), 0 1px 2px rgba(0,0,0,.4);
  }
  .btn.safe .cap{
    opacity:0;transform:scale(.6);
  }
  .btn.bomb .cap{
    opacity:1;
    background:transparent;
    box-shadow:none;
    animation:none;
  }
  .btn.bomb .cap .mark{
    opacity:1;transform:scale(1);
    font-size:clamp(30px,11vw,54px);line-height:1;
    filter:drop-shadow(0 1px 3px rgba(0,0,0,.55));
  }
  .btn.revealed{opacity:.5;}
  .btn:focus-visible{outline:3px solid #1a73e8;outline-offset:3px;}

  .footbar{display:flex;justify-content:space-between;align-items:center;padding:12px 6px 2px;}
  .iconbtn{
    width:46px;height:46px;border-radius:50%;border:none;cursor:pointer;
    background:#f0f0f0;color:#333;font-size:22px;font-weight:800;
    box-shadow:0 2px 4px rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;
    transition:transform .08s;
  }
  .iconbtn:active{transform:scale(.92);}
  .iconbtn:focus-visible{outline:3px solid #1a73e8;outline-offset:2px;}

  .toggle{
    display:flex;align-items:center;gap:8px;cursor:pointer;
    font-size:12px;font-weight:800;color:#444;letter-spacing:.04em;
  }
  .toggle .sw{
    position:relative;width:46px;height:26px;border-radius:13px;
    background:#888;transition:background .2s;flex:none;
    box-shadow:inset 0 1px 3px rgba(0,0,0,.45);
  }
  .toggle .sw::after{
    content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;
    border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.4);
    transition:left .2s;
  }
  .toggle input{position:absolute;opacity:0;width:0;height:0;}
  .toggle input:checked + .sw{background:#e0231a;}
  .toggle input:checked + .sw::after{left:23px;}
  .toggle input:focus-visible + .sw{outline:3px solid #1a73e8;outline-offset:2px;}
  .toggle .state{min-width:26px;}

  .insult{
    position:fixed;left:50%;top:38%;transform:translate(-50%,-50%) scale(.6);
    z-index:210;pointer-events:none;opacity:0;
    max-width:84vw;text-align:center;
    font-size:clamp(22px,7vw,40px);font-weight:900;color:#fff;
    text-shadow:0 0 8px #c01206, 0 3px 6px rgba(0,0,0,.7),
      2px 2px 0 #7a0d08, -2px -2px 0 #7a0d08;
    -webkit-text-stroke:1px rgba(0,0,0,.3);
  }
  .insult.go{animation:insultPop 2.2s cubic-bezier(.2,1.2,.4,1) forwards;}
  @keyframes insultPop{
    0%{opacity:0;transform:translate(-50%,-50%) scale(.4) rotate(-6deg);}
    14%{opacity:1;transform:translate(-50%,-50%) scale(1.12) rotate(3deg);}
    24%{transform:translate(-50%,-50%) scale(1) rotate(-2deg);}
    80%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0);}
    100%{opacity:0;transform:translate(-50%,-58%) scale(1) rotate(0);}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important;}
  }

  #blast{position:fixed;inset:0;pointer-events:none;z-index:200;}
  .blastflash{position:absolute;inset:0;background:#fff;opacity:0;}
  .blastflash.go{animation:bflash .6s ease-out forwards;}
  @keyframes bflash{
    0%{opacity:1;background:#fff;}
    25%{opacity:.9;background:#ffd54a;}
    55%{opacity:.7;background:#ff6a2b;}
    100%{opacity:0;background:#c01206;}
  }
  .fireball{position:absolute;left:50%;top:50%;width:40px;height:40px;
    margin:-20px 0 0 -20px;border-radius:50%;opacity:0;
    background:radial-gradient(circle,#fff 0%,#ffd23f 25%,#ff6a00 55%,#c01206 80%,transparent 100%);}
  .fireball.go{animation:fball .7s cubic-bezier(.1,.7,.3,1) forwards;}
  @keyframes fball{
    0%{opacity:1;transform:scale(.2);}
    70%{opacity:.95;}
    100%{opacity:0;transform:scale(34);}
  }
  .ring{position:absolute;left:50%;top:50%;width:30px;height:30px;margin:-15px 0 0 -15px;
    border-radius:50%;border:6px solid #fff;opacity:0;}
  .ring.go{animation:bring .6s cubic-bezier(.2,.7,.3,1) forwards;}
  @keyframes bring{0%{opacity:.9;transform:scale(.3);}100%{opacity:0;transform:scale(26);border-color:#ff5b1a;}}
  .chunk{position:absolute;left:50%;top:50%;border-radius:3px;will-change:transform,opacity;}
  .chunk.go{animation:chunk var(--dur) cubic-bezier(.12,.6,.4,1) forwards;}
  @keyframes chunk{
    0%{opacity:1;transform:translate(-50%,-50%) rotate(0) scale(1);}
    100%{opacity:0;transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) rotate(var(--rot)) scale(.3);}
  }
  .machine.shake{animation:mshake .6s ease-out;}
  @keyframes mshake{
    0%,100%{transform:translate(0,0) rotate(0);}
    10%{transform:translate(-8px,6px) rotate(-1deg);}
    20%{transform:translate(9px,-5px) rotate(1deg);}
    30%{transform:translate(-10px,4px) rotate(-1.2deg);}
    45%{transform:translate(7px,-6px) rotate(.8deg);}
    60%{transform:translate(-5px,3px) rotate(-.6deg);}
    78%{transform:translate(3px,-2px) rotate(.3deg);}
  }
</style>
</head>
<body>
  <a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,0.25)">← 一覧に戻る</a>
  <div id="blast"></div>
  <div class="insult" id="insult" aria-live="polite"></div>
  <div class="machine" id="machine">
    <div class="panel">
      <div class="hud">
        <span class="label">BOMB &middot; 1 / 16</span>
        <span class="count"><span id="picks">0</span> / 15 SAFE</span>
      </div>
      <div class="status" id="status">赤いボタンを押せ</div>
      <div class="grid" id="grid" role="group" aria-label="ボタン16個"></div>
      <div class="footbar">
        <button class="iconbtn" id="reset" aria-label="やり直す">&#x21bb;</button>
        <label class="toggle">
          <span>ちくちくモード</span>
          <input type="checkbox" id="chiku">
          <span class="sw" aria-hidden="true"></span>
          <span class="state" id="chikuState">OFF</span>
        </label>
      </div>
    </div>
  </div>

<script>
(function(){
  const N=16, SAFE=15;
  const grid=document.getElementById('grid');
  const statusEl=document.getElementById('status');
  const picksEl=document.getElementById('picks');
  const resetBtn=document.getElementById('reset');
  const machine=document.getElementById('machine');
  const blast=document.getElementById('blast');
  const insultEl=document.getElementById('insult');
  const chiku=document.getElementById('chiku');
  const chikuState=document.getElementById('chikuState');
  let over, picks, btns=[];

  const INSULTS=[
    'ドンマイ！次がんばろ',
    'あちゃー、引いちゃったか〜',
    '今日の運、全部ここで使ったね',
    '爆死。でも顔は無事でよかった',
    '持ってるねぇ〜（悪い意味で）',
    'うわっ、センスないわ〜',
    'やっぱりお前か（笑）',
    '引きの弱さは才能だね',
    'みんな見た？こいつだよ',
    '罰ゲーム確定。逃げられません',
    '罰ゲーム2倍！おめでとう',
    '今のは効いた…罰ゲーム2倍ね',
    '見事すぎる爆死、罰ゲーム2倍だ',
  ];

  function vibrate(p){ if(navigator.vibrate) navigator.vibrate(p); }
  function reduced(){ return window.matchMedia('(prefers-reduced-motion: reduce)').matches; }

  const BOMB_ICON='💣';

  function showInsult(){
    if(!chiku.checked) return;
    const msg=INSULTS[Math.floor(Math.random()*INSULTS.length)];
    insultEl.textContent=msg;
    insultEl.classList.remove('go');void insultEl.offsetWidth;insultEl.classList.add('go');
  }

  function build(){
    grid.innerHTML='';btns=[];
    over=false;picks=0;picksEl.textContent='0';
    statusEl.textContent='赤いボタンを押せ';statusEl.className='status';
    for(let i=0;i<N;i++){
      const slot=document.createElement('div');slot.className='slot';
      const b=document.createElement('button');
      b.className='btn';b.setAttribute('aria-label',(i+1)+'番のボタン');
      b.innerHTML='<span class="bezel"></span><span class="cap"><span class="mark" aria-hidden="true"></span></span>';
      b.addEventListener('click',()=>pick(i,b));
      slot.appendChild(b);grid.appendChild(slot);btns.push(b);
    }
  }

  function pick(i,b){
    if(over||b.disabled) return;
    b.disabled=true;b.classList.add('pressed');
    const mark=b.querySelector('.mark');
    const remaining = N - picks;
    const isBomb = (remaining<=1);
    if(isBomb){
      b.classList.add('bomb');mark.textContent=BOMB_ICON;
      statusEl.textContent='💥 ドカーン！ 大爆発';statusEl.className='status boom';
      bigExplosion();
      showInsult();
      vibrate([80,50,150,40,250]);
      endGame(i);
    }else{
      b.classList.add('safe');
      picks++;picksEl.textContent=picks;vibrate(18);
      statusEl.textContent = (picks>=SAFE) ? '残り1個…それが爆弾だ！' : 'セーフ… 次は誰だ？';
    }
  }

  function endGame(bombIdx){
    over=true;
    btns.forEach((c,idx)=>{
      if(!c.classList.contains('safe')&&!c.classList.contains('bomb')){
        if(idx===bombIdx){c.classList.add('bomb');c.querySelector(".mark").textContent=BOMB_ICON;}
        c.classList.add('revealed');
      }
      c.disabled=true;
    });
  }

  function bigExplosion(){
    if(reduced()) return;
    machine.classList.remove('shake');void machine.offsetWidth;machine.classList.add('shake');
    blast.innerHTML='';
    const flash=document.createElement('div');flash.className='blastflash';blast.appendChild(flash);
    void flash.offsetWidth;flash.classList.add('go');
    const fb=document.createElement('div');fb.className='fireball';blast.appendChild(fb);
    void fb.offsetWidth;fb.classList.add('go');
    const ring=document.createElement('div');ring.className='ring';blast.appendChild(ring);
    void ring.offsetWidth;ring.classList.add('go');
    const colors=['#ff5b1a','#ffd23f','#ff8a3d','#fff1d0','#c01206','#ffae42'];
    const W=window.innerWidth,H=window.innerHeight;
    const reach=Math.max(W,H)*0.75;
    for(let k=0;k<60;k++){
      const c=document.createElement('div');c.className='chunk';
      const ang=Math.random()*Math.PI*2;
      const dist=reach*(0.35+Math.random()*0.65);
      const sz=6+Math.random()*16;
      c.style.width=sz+'px';c.style.height=(sz*(0.5+Math.random()*1.2))+'px';
      c.style.background=colors[(Math.random()*colors.length)|0];
      c.style.setProperty('--dx',Math.cos(ang)*dist+'px');
      c.style.setProperty('--dy',Math.sin(ang)*dist + H*0.25 +'px');
      c.style.setProperty('--rot',(Math.random()*1080-540)+'deg');
      c.style.setProperty('--dur',(0.7+Math.random()*0.7)+'s');
      blast.appendChild(c);void c.offsetWidth;c.classList.add('go');
    }
    setTimeout(()=>{blast.innerHTML='';},1600);
  }

  resetBtn.addEventListener('click',build);
  chiku.addEventListener('change',()=>{
    chikuState.textContent=chiku.checked?'ON':'OFF';
  });
  build();
})();
</script>
<script src="../shared/firebase-counter.js"></script>
</body>
</html>
