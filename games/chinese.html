<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>チャイニーズチェッカー</title>
<style>
:root{--bg:#14110E;--panel:#1F1A14;--txt:#EDE6D6;--sub:#9A8F7B;--gold:#C9A227;--line:#352C20;--me:#3e87d6;--cpu:#e0473a;--hole:#2a2419;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:14px 10px 28px;user-select:none}
h1{font-family:"Hiragino Mincho ProN",serif;font-size:21px;letter-spacing:.08em;margin:2px 0}
.sub{font-size:10px;color:var(--sub);letter-spacing:.18em;margin-bottom:8px}
.row{display:flex;gap:7px;margin-bottom:8px;flex-wrap:wrap;justify-content:center}
.row button{background:transparent;border:1px solid #3a3326;color:var(--sub);padding:6px 12px;border-radius:18px;font-size:12px;cursor:pointer;font-family:inherit;transition:all .2s}
.row button.on{border-color:var(--gold);color:var(--gold)}
.turn{font-size:13px;color:var(--gold);min-height:20px;margin-bottom:6px}
.bwrap{padding:8px;border-radius:12px;background:var(--panel);box-shadow:0 12px 36px rgba(0,0,0,.5)}
svg{display:block;width:min(92vw,420px);height:auto}
.hole{fill:var(--hole);stroke:#3a3326;stroke-width:1;cursor:pointer}
.goalA{fill:#1c2c3e}.goalB{fill:#3a201c}
.peg{cursor:pointer;transition:transform .1s}
.peg.me{fill:url(#pme)}.peg.cpu{fill:url(#pcpu)}
.sel{stroke:var(--gold);stroke-width:3}
.dest{fill:rgba(201,162,39,.5);cursor:pointer}
.msg{min-height:20px;font-size:12.5px;color:var(--gold);margin-top:10px;text-align:center}
.foot{margin-top:8px}
.foot button{background:transparent;border:1px solid var(--line);color:var(--txt);padding:8px 18px;border-radius:6px;font-size:13px;cursor:pointer;font-family:inherit}
.over{position:fixed;inset:0;background:rgba(10,8,5,.85);display:none;align-items:center;justify-content:center;z-index:30}
.over.show{display:flex}
.over .c{background:#241c10;border:1px solid var(--gold);border-radius:10px;padding:24px 36px;text-align:center}
.over .t{font-size:23px;color:var(--gold);font-family:"Hiragino Mincho ProN",serif;margin-bottom:8px}
.over button{background:var(--gold);border:none;color:#241c10;font-weight:700;padding:9px 22px;border-radius:7px;cursor:pointer;font-size:14px;font-family:inherit;margin-top:8px}
</style>
</head>
<body>
<a href="../index.html" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(0,0,0,0.55);color:#fff;text-decoration:none;font:600 13px/1 'Segoe UI',sans-serif;padding:8px 13px;border-radius:999px;border:1px solid rgba(255,255,255,0.25)">← 一覧に戻る</a>
<h1>チャイニーズチェッカー</h1><div class="sub">CHINESE CHECKERS — 2人版</div>
<div class="row" id="mode"><button data-m="cpu" class="on">CPU対戦</button><button data-m="pvp">2人対戦</button></div>
<div class="turn" id="turn"></div>
<div class="bwrap"><svg id="bd"></svg></div>
<div class="msg" id="msg">自分の駒(青)をタップ→光った穴へ移動。相手側の三角を全部埋めたら勝ち。</div>
<div class="foot"><button id="new">最初から</button></div>
<div class="over" id="over"><div class="c"><div class="t" id="ov-t">勝利</div><button id="again">もう一度</button></div></div>
<script>
const NS='http://www.w3.org/2000/svg';
// Sternhalma 行構成（上から下）。各行のセル数。
const ROWS=[1,2,3,4,13,12,11,10,9,10,11,12,13,4,3,2,1];
let mode='cpu';
let cells=[];      // {id,x,y,r,zone:'A'|'B'|'mid'}  zone A=上三角(行0-3) B=下三角(行13-16)
let occ;           // id -> 0(me)/1(cpu)/-1
let adj;           // id -> [neighborIds]
let svg=document.getElementById('bd');
let sel=null,dests=[],turn=0,over=false,busy=false;
function buildCells(){
  cells=[];const UNIT=1;let id=0;let maxX=0;
  for(let r=0;r<ROWS.length;r++){const n=ROWS[r];
    for(let c=0;c<n;c++){const x=(c-(n-1)/2)*UNIT, y=r*(Math.sqrt(3)/2)*UNIT;
      let zone='mid';if(r<4)zone='A';else if(r>12)zone='B';
      cells.push({id:id++,x,y,r,zone});maxX=Math.max(maxX,Math.abs(x));}}
  // 隣接(距離≈1)
  adj={};for(const a of cells){adj[a.id]=[];for(const b of cells){if(a===b)continue;
    const d=Math.hypot(a.x-b.x,a.y-b.y);if(Math.abs(d-1)<0.12)adj[a.id].push(b.id);}}
}
function cellById(id){return cells[id];}
function jumpTarget(fromId,viaId){ // from→via→その先(直線上)
  const f=cellById(fromId),v=cellById(viaId);
  const tx=v.x+(v.x-f.x), ty=v.y+(v.y-f.y);
  return cells.find(c=>Math.hypot(c.x-tx,c.y-ty)<0.12);
}
function init(){
  buildCells();occ={};cells.forEach(c=>occ[c.id]=-1);
  // 上三角A=CPU(1)?いや あなた=下から上へ進む直感。ここでは あなた=A(上)→Bへ進む / CPU=B(下)→Aへ進む…
  // 視覚的に下=自分が自然なので: 自分(me,0)=B(下三角)、ゴールA。 CPU(1)=A(上)、ゴールB。
  cells.filter(c=>c.zone==='B').forEach(c=>occ[c.id]=0);  // me 青 下
  cells.filter(c=>c.zone==='A').forEach(c=>occ[c.id]=1);  // cpu 赤 上
  sel=null;dests=[];turn=0;over=false;busy=false;
  document.getElementById('over').classList.remove('show');
  render();updateTurn();
}
function myGoalZone(p){return p===0?'A':'B';}   // me(0)はAを目指す
function updateTurn(){document.getElementById('turn').textContent=over?'対局終了':
  (mode==='pvp'?(turn===0?'青の番':'赤の番'):(turn===0?'あなた(青)の番':'CPUの番'));}
function isHuman(){return mode==='pvp'||turn===0;}
function render(){
  // 盤サイズ
  const xs=cells.map(c=>c.x),ys=cells.map(c=>c.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const PAD=1.2,SC=22;
  const W=(maxX-minX+PAD*2)*SC,H=(maxY-minY+PAD*2)*SC;
  svg.setAttribute('viewBox',`0 0 ${W} ${H}`);
  const px=x=>(x-minX+PAD)*SC, py=y=>(y-minY+PAD)*SC;
  svg.innerHTML=`<defs>
    <radialGradient id="pme" cx=".35" cy=".3" r=".9"><stop offset="0" stop-color="#8cc0f0"/><stop offset="1" stop-color="#2a5fa8"/></radialGradient>
    <radialGradient id="pcpu" cx=".35" cy=".3" r=".9"><stop offset="0" stop-color="#f08a80"/><stop offset="1" stop-color="#a02a22"/></radialGradient></defs>`;
  for(const c of cells){
    const hole=document.createElementNS(NS,'circle');
    hole.setAttribute('cx',px(c.x));hole.setAttribute('cy',py(c.y));hole.setAttribute('r',SC*0.36);
    hole.setAttribute('class','hole'+(c.zone==='A'?' goalA':c.zone==='B'?' goalB':''));
    hole.addEventListener('click',()=>onCell(c.id));svg.appendChild(hole);
  }
  // 移動先ハイライト
  for(const d of dests){const c=cellById(d);const m=document.createElementNS(NS,'circle');
    m.setAttribute('cx',px(c.x));m.setAttribute('cy',py(c.y));m.setAttribute('r',SC*0.2);m.setAttribute('class','dest');
    m.addEventListener('click',()=>onCell(c.id));svg.appendChild(m);}
  // 駒
  for(const c of cells){if(occ[c.id]<0)continue;const p=document.createElementNS(NS,'circle');
    p.setAttribute('cx',px(c.x));p.setAttribute('cy',py(c.y));p.setAttribute('r',SC*0.3);
    p.setAttribute('class','peg '+(occ[c.id]===0?'me':'cpu')+(sel===c.id?' sel':''));
    p.addEventListener('click',()=>onCell(c.id));svg.appendChild(p);}
}
function legalMoves(id){ // 単歩 + ジャンプ連鎖
  const res=new Set();
  for(const n of adj[id])if(occ[n]<0)res.add(n);
  // ジャンプ(BFS)
  const seen=new Set([id]),stack=[id];
  while(stack.length){const cur=stack.pop();
    for(const via of adj[cur]){if(occ[via]<0)continue;const t=jumpTarget(cur,via);
      if(t&&occ[t.id]<0&&adj[cur].includes(via)&&!seen.has(t.id)){
        // viaがcurとtの中間で直線上
        if(Math.abs(Math.hypot(cellById(cur).x-via*0,0))>=0){} // noop
        seen.add(t.id);res.add(t.id);stack.push(t.id);}}}
  res.delete(id);return[...res];
}
function onCell(id){
  if(over||busy||!isHuman())return;
  if(dests.includes(id)){move(sel,id);return;}
  if(occ[id]===turn){sel=id;dests=legalMoves(id);render();return;}
  sel=null;dests=[];render();
}
function move(from,to){
  occ[to]=turn;occ[from]=-1;sel=null;dests=[];
  if(checkWin(turn)){over=true;render();finish(turn);return;}
  turn=1-turn;render();updateTurn();
  if(!isHuman()&&!over){busy=true;setTimeout(cpuMove,520);}
}
function checkWin(p){const goal=myGoalZone(p);
  const goalCells=cells.filter(c=>c.zone===goal);
  return goalCells.every(c=>occ[c.id]===p);}
function cpuMove(){busy=false;if(over)return;const p=1;
  // 各駒の全合法手を集め、ゴール方向(p=1はB=下=y大)へ最も進む手を選ぶ
  let best=null,bestScore=-1e9;
  for(const c of cells){if(occ[c.id]!==p)continue;
    for(const to of legalMoves(c.id)){
      const dy=cellById(to).y-c.y; // pは下へ進みたい(y増)
      let sc=dy*10 + (cellById(to).zone==='B'?15:0) - Math.abs(cellById(to).x)*0.5 + Math.random()*2;
      if(sc>bestScore){bestScore=sc;best=[c.id,to];}}}
  if(!best){turn=0;render();updateTurn();return;}
  move(best[0],best[1]);
}
function finish(p){const t=document.getElementById('ov-t');
  if(mode==='pvp')t.textContent=p===0?'青の勝ち！':'赤の勝ち！';
  else t.textContent=p===0?'あなたの勝ち！🎉':'CPUの勝ち';
  document.getElementById('over').classList.add('show');}
document.getElementById('new').addEventListener('click',init);
document.getElementById('again').addEventListener('click',init);
document.getElementById('mode').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.m;document.querySelectorAll('#mode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
init();
</script>
</body>
</html>
