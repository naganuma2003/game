<meta property="og:title" content="三目並べ（Tic-Tac-Toe）| 無料ブラウザゲーム">
<meta property="og:description" content="三目並べ（Tic-Tac-Toe）を無料で遊べるブラウザゲーム。CPU対戦対応。スマホ対応。">

<style>
:root{--bg:#15120E;--txt:#EDE6D6;--sub:#9A8F7B;--gold:#C9A227;--line:#4A4030;--o:#5b9bd5;--x:#e0533e;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Yu Gothic UI",sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:18px 12px;user-select:none}
h1{font-family:"Hiragino Mincho ProN",serif;font-size:28px;letter-spacing:.2em;text-indent:.2em;margin:2px 0}
.sub{font-size:11px;color:var(--sub);letter-spacing:.2em;margin-bottom:14px}
.row{display:flex;gap:8px;margin-bottom:14px}
.row button{background:transparent;border:1px solid #3a3326;color:var(--sub);padding:7px 14px;border-radius:18px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .2s}
.row button.on{border-color:var(--gold);color:var(--gold)}
.status{font-size:16px;min-height:26px;margin-bottom:12px;letter-spacing:.05em}
#bd{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);gap:8px;width:min(82vw,320px);aspect-ratio:1/1}
.cell{overflow:hidden;line-height:1}
.cell{background:#221E17;border:1px solid var(--line);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:min(16vw,64px);font-weight:800;cursor:pointer}
.cell.o{color:var(--o)}.cell.x{color:var(--x)}
.cell.win{background:#46402d;border-color:var(--gold)}
.foot{margin-top:18px}
.foot button{background:var(--gold);border:none;color:#15120E;font-weight:700;padding:9px 22px;border-radius:8px;cursor:pointer;font-size:14px;font-family:inherit}
.score{display:flex;gap:18px;margin-top:14px;font-size:13px;color:var(--sub)}
.score b{color:var(--txt)}
.eval-row{display:flex;align-items:center;gap:7px;margin:4px 0 8px}
.eval-btn{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.45);padding:3px 9px;border-radius:12px;font-size:11px;cursor:pointer;font-family:inherit;transition:.2s;white-space:nowrap}
.eval-btn.on{border-color:var(--gold,#c9a030);color:var(--gold,#c9a030)}
.eval-bar{width:140px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;position:relative}
.eval-fill{position:absolute;left:0;top:0;bottom:0;border-radius:4px;transition:width .3s,background .3s}
.eval-lbl{font-size:11px;color:rgba(255,255,255,.5);white-space:nowrap}
.assist-toggle{display:inline-flex;align-items:center;gap:6px;margin:4px 0;font-size:13px;cursor:pointer}
.assist-toggle input{accent-color:#c9a227;cursor:pointer}
.cell{position:relative}
.cell .hint-score{position:absolute;font-size:10px;font-weight:800;display:none;pointer-events:none;z-index:2;top:2px;right:3px;line-height:1}
.cell.assist .hint-score{display:block}
.cell.rank1{box-shadow:inset 0 0 0 2px #ff4d4d}
.cell.rank2{box-shadow:inset 0 0 0 2px #ff9e2c}
.cell.rank3{box-shadow:inset 0 0 0 2px #ffe04d}
.cell.rank1 .hint-score{color:#ff4d4d}
.cell.rank2 .hint-score{color:#ff9e2c}
.cell.rank3 .hint-score{color:#ffe04d}

@media(max-width:480px){
  h1{font-size:20px;letter-spacing:.2em;text-indent:.2em}
  .modes,.row{flex-wrap:wrap;justify-content:center}
  .modes button,.row button,.foot button{min-height:44px}
}
</style>

<h1>三目並べ</h1><div class="sub">TIC-TAC-TOE</div>
<div class="row" id="mode">
  <button data-m="cpu1" class="on">CPU 弱</button>
  <button data-m="cpu2">CPU 普通</button>
  <button data-m="cpu3">CPU 強</button>
  <button data-m="pvp">2人対戦</button>
</div>
<div class="status" id="status">あなた（○）の番</div>
<div class="eval-row" id="eval-row"><button class="eval-btn" id="eval-btn" onclick="toggleEval()">形勢</button><div class="eval-bar" id="eval-bar" style="display:none"><div class="eval-fill" id="eval-fill"></div></div><span class="eval-lbl" id="eval-lbl" style="display:none"></span></div>
<label class="assist-toggle"><input type="checkbox" id="assist"> AIアシスタント（最善手を表示）</label>
<div id="bd"></div>
<div class="score"><span>○ <b id="sO">0</b></span><span>引分 <b id="sD">0</b></span><span>× <b id="sX">0</b></span></div>
<div class="foot" style="display:flex;gap:8px"><button id="undo" style="background:transparent;border:1px solid #4A4030;color:#EDE6D6;font-weight:700;padding:9px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit">待った</button><button id="reset">最初から</button></div>
<script>
let bd,turn,over,mode='cpu1',cells=[],sc={O:0,X:0,D:0},hist=[];
function isCpu(){return mode==='cpu1'||mode==='cpu2'||mode==='cpu3';}
const WINS=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
const board=document.getElementById('bd');
for(let i=0;i<9;i++){const d=document.createElement('div');d.className='cell';d.innerHTML='<span class="piece-txt"></span><span class="hint-score"></span>';d.addEventListener('click',()=>tap(i));board.appendChild(d);cells.push(d);}
function init(){bd=Array(9).fill('');turn='O';over=false;hist=[];render();setStatus();if(isCpu()&&Math.random()<0.5){turn='X';setStatus();setTimeout(()=>{move(cpuMove());},400);}}
function setStatus(t){const s=document.getElementById('status');if(t){s.textContent=t;return;}if(mode==='pvp')s.textContent=(turn==='O'?'○':'×')+'の番';else s.textContent=turn==='O'?'あなた（○）の番':'CPUの番';}
function cpuMove(){var empty=[];for(var i=0;i<9;i++)if(!bd[i])empty.push(i);if(!empty.length)return 0;var bestIdx=best('X');if(mode==='cpu1'){if(Math.random()<0.8)return empty[Math.floor(Math.random()*empty.length)];return bestIdx;}if(mode==='cpu2'){if(Math.random()<0.3)return empty[Math.floor(Math.random()*empty.length)];return bestIdx;}return bestIdx;}
function render(){
  var assist=computeAssist();
  for(var i=0;i<9;i++){
    cells[i].className='cell'+(bd[i]==='O'?' o':bd[i]==='X'?' x':'');
    var pt=cells[i].querySelector('.piece-txt');
    var hs=cells[i].querySelector('.hint-score');
    if(pt)pt.textContent=bd[i];
    cells[i].classList.remove('assist','rank1','rank2','rank3');
    if(hs)hs.textContent='';
    if(assist&&assist[i]!==undefined&&!bd[i]){
      cells[i].classList.add('assist','rank'+(assist[i]+1));
    }
  }
  updateEval();
}
function winner(b){for(const w of WINS){const[a,c,d]=w;if(b[a]&&b[a]===b[c]&&b[a]===b[d])return{p:b[a],line:w};}if(b.every(x=>x))return{p:'D'};return null;}
function tap(i){if(over||bd[i])return;if(isCpu()&&turn!=='O')return;move(i);}
function move(i){hist.push({bd:bd.slice(),turn,over});bd[i]=turn;render();const w=winner(bd);if(w){end(w);return;}turn=turn==='O'?'X':'O';setStatus();if(isCpu()&&turn==='X'){setTimeout(()=>{move(cpuMove());},350);}}
function end(w){over=true;if(w.p==='D'){sc.D++;setStatus('引き分け');}else{sc[w.p]++;if(w.line)for(const j of w.line)cells[j].classList.add('win');if(mode==='pvp')setStatus((w.p==='O'?'○':'×')+'の勝ち！');else setStatus(w.p==='O'?'あなたの勝ち！🎉':'CPUの勝ち');}
document.getElementById('sO').textContent=sc.O;document.getElementById('sX').textContent=sc.X;document.getElementById('sD').textContent=sc.D;}
function best(p){const o=p==='X'?'O':'X';function mm(b,who){const w=winner(b);if(w){if(w.p===p)return{s:10};if(w.p===o)return{s:-10};return{s:0};}let best=null;for(let i=0;i<9;i++){if(b[i])continue;b[i]=who;const r=mm(b,who===p?o:p);b[i]='';const s=r.s;if(best===null||(who===p?s>best.s:s<best.s))best={s,i};}return best;}
return mm(bd.slice(),p).i;}
document.getElementById('reset').addEventListener('click',init);
document.getElementById('undo').addEventListener('click',()=>{if(!hist.length)return;let h=hist.pop();if(isCpu()){while(hist.length&&h.turn!=='O')h=hist.pop();}bd=h.bd;turn=h.turn;over=h.over;render();setStatus();});
document.getElementById('mode').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;mode=b.dataset.m;document.querySelectorAll('#mode button').forEach(x=>x.classList.remove('on'));b.classList.add('on');init();});
init();
// ===== AIアシスタント =====
var assistEl=document.getElementById('assist');
if(assistEl)assistEl.addEventListener('change',render);

function computeAssist(){
  if(!assistEl||!assistEl.checked||over)return null;
  var isHuman=(mode==='pvp')||(turn==='O');
  if(!isHuman)return null;
  var sign=(turn==='O')?1:-1;
  var scores=[];
  for(var i=0;i<9;i++){
    if(bd[i])continue;
    bd[i]=turn;
    scores.push({i:i,s:sign*evalScore()});
    bd[i]='';
  }
  scores.sort(function(a,b){return b.s-a.s;});
  var top=scores.slice(0,3);
  var map={};
  top.forEach(function(m,ri){map[m.i]=ri;});
  return map;
}

// ===== AI評価 =====
var evalOn=false;
function toggleEval(){
  evalOn=!evalOn;
  document.getElementById('eval-btn').classList.toggle('on',evalOn);
  document.getElementById('eval-bar').style.display=evalOn?'block':'none';
  document.getElementById('eval-lbl').style.display=evalOn?'inline':'none';
  updateEval();
}
function updateEval(){
  if(!evalOn)return;
  const s=evalScore(),MAX=9;
  const C1='#5b9bd5',C2='#e0533e',N1='○',N2='×';
  const pct=Math.min(Math.max((s+MAX)/(2*MAX),0),1);
  document.getElementById('eval-fill').style.cssText=`width:${pct*100}%;background:${s>0.3?C1:s<-0.3?C2:'#888'}`;
  document.getElementById('eval-lbl').textContent=Math.abs(s)<0.3?'互角':s>0?`${N1}+${Math.round(Math.abs(s))}`:`${N2}+${Math.round(Math.abs(s))}`;
}
function evalScore(){
  if(over)return 0;
  let score=0;
  for(const w of WINS){
    const[a,b,c]=w;
    const vals=[bd[a],bd[b],bd[c]];
    const os=vals.filter(v=>v==='O').length;
    const xs=vals.filter(v=>v==='X').length;
    if(xs===0&&os>0)score+=(os===2?3:1);
    if(os===0&&xs>0)score-=(xs===2?3:1);
  }
  return score;
}
